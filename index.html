<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSE SIMT Ultimate v17 | Petr's Plays CZ</title>
    
    <style>
        /* --- 1. GLOBÁLNÍ DESIGN (SIMT DARK THEME) --- */
        :root {
            --simt-orange: #ff8c00;
            --simt-orange-glow: rgba(255, 140, 0, 0.4);
            --simt-bg-dark: #08080a;
            --simt-panel: #121217;
            --simt-card: #1c1c24;
            --simt-border: rgba(255, 255, 255, 0.08);
            --simt-text: #e0e0e0;
            --simt-text-dim: #707080;
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --radius-lg: 16px;
            --radius-md: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--simt-bg-dark);
            color: var(--simt-text);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- 2. LAYOUT STRUKTURA --- */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 70px 1fr 35px;
            grid-template-areas: 
                "sidebar header"
                "sidebar main"
                "sidebar footer";
            height: 100vh;
        }

        /* --- 3. HEADER (EXPORTNÍ ZÓNA) --- */
        header {
            grid-area: header;
            background: var(--simt-panel);
            border-bottom: 1px solid var(--simt-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 100;
        }

        .header-title { display: flex; align-items: center; gap: 15px; }
        .status-dot { width: 10px; height: 10px; background: var(--simt-orange); border-radius: 50%; box-shadow: 0 0 10px var(--simt-orange); }

        .action-group { display: flex; gap: 12px; }

        /* --- 4. SIDEBAR (NÁSTROJE) --- */
        aside {
            grid-area: sidebar;
            background: var(--simt-panel);
            border-right: 1px solid var(--simt-border);
            display: flex; flex-direction: column;
            overflow-y: auto; padding: 25px; gap: 30px;
        }

        .section-label {
            font-size: 11px; font-weight: 800; color: var(--simt-text-dim);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
            display: block;
        }

        /* --- 5. TLAČÍTKA A OVLÁDÁNÍ --- */
        .btn {
            background: var(--simt-card);
            border: 1px solid var(--simt-border);
            color: var(--simt-text);
            padding: 12px; border-radius: var(--radius-md);
            cursor: pointer; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: var(--transition);
        }

        .btn:hover { border-color: var(--simt-orange); background: #25252f; }
        .btn-active { background: var(--simt-orange) !important; color: #000 !important; border-color: var(--simt-orange) !important; }
        .btn-danger { color: #ff5555; border-color: rgba(255, 85, 85, 0.2); }
        .btn-danger:hover { background: rgba(255, 85, 85, 0.1); border-color: #ff5555; }

        .btn-export {
            background: var(--simt-orange);
            color: #000; font-weight: 800;
            padding: 10px 25px; border-radius: 50px;
            box-shadow: 0 4px 15px var(--simt-orange-glow);
        }
        .btn-export:hover { transform: scale(1.05); background: #ffa500; }

        /* --- 6. BARVY --- */
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .swatch {
            aspect-ratio: 1; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; transition: var(--transition);
        }
        .swatch.active { border-color: white; transform: translateY(-3px); }
        .c-ora { background: #ff8c00; box-shadow: 0 0 10px rgba(255, 140, 0, 0.3); }
        .c-gre { background: #4caf50; }
        .c-whi { background: #ffffff; }
        .c-bla { background: #000000; border: 1px solid #333 !important; }

        /* --- 7. PLÁTNO (BUSE PANEL LOOK) --- */
        main {
            grid-area: main;
            background: radial-gradient(circle at 50% 50%, #1a1a22 0%, #050505 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: auto; padding: 100px;
        }

        .panel-frame {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #222;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        .canvas-container {
            position: relative;
            background: #000;
            cursor: crosshair;
            /* Simulace DOT-matrix mřížky přes CSS */
            background-image: 
                radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 10px 10px; /* Bude upraveno přes JS podle zoomu */
        }

        canvas {
            image-rendering: pixelated;
            display: block;
        }

        /* --- 8. FOOTER --- */
        footer {
            grid-area: footer;
            background: #000; border-top: 1px solid var(--simt-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; font-family: var(--font-mono); font-size: 10px;
            color: var(--simt-text-dim);
        }

        /* --- 9. MODALS & TOASTS --- */
        #toast-container {
            position: fixed; bottom: 50px; right: 30px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .toast {
            background: var(--simt-card); color: white; padding: 15px 25px;
            border-radius: 10px; border-left: 4px solid var(--simt-orange);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 13px;
            animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--simt-bg-dark); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header>
            <div class="header-title">
                <div class="status-dot"></div>
                <h1 style="font-size: 14px; letter-spacing: 1px; color: #fff;">BUSE SIMT <span style="font-weight: 300; opacity: 0.5;">STUDIO v17</span></h1>
            </div>
            <div class="action-group">
                <button class="btn" onclick="Core.undo()">↩ Zpět</button>
                <button class="btn btn-export" onclick="IO.export()">💾 EXPORTOVAT PNG</button>
            </div>
        </header>

        <aside>
            <div class="section">
                <span class="section-label">Nástroje Kreslení</span>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button id="t-pen" class="btn btn-active" onclick="Core.setTool('pen')">Tužka</button>
                    <button id="t-erase" class="btn" onclick="Core.setTool('erase')">Guma</button>
                    <button id="t-fill" class="btn" onclick="Core.setTool('fill')">Vylít (G)</button>
                    <button id="t-line" class="btn" onclick="Core.setTool('line')">Čára (L)</button>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Barva Diod</span>
                <div class="color-grid">
                    <div class="swatch c-ora active" id="p-ora" onclick="Core.setColor('#ff8c00', 'p-ora')"></div>
                    <div class="swatch c-gre" id="p-gre" onclick="Core.setColor('#4caf50', 'p-gre')"></div>
                    <div class="swatch c-whi" id="p-whi" onclick="Core.setColor('#ffffff', 'p-whi')"></div>
                    <div class="swatch c-bla" id="p-bla" onclick="Core.setColor('#000000', 'p-bla')"></div>
                </div>
            </div>

            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span class="section-label" style="margin:0;">Štětec</span>
                    <span id="brush-txt" style="color: var(--simt-orange); font-family: var(--font-mono); font-weight: 800;">1px</span>
                </div>
                <input type="range" id="brush-size" min="1" max="10" value="1" style="width:100%;" oninput="UI.updateBrush()">
            </div>

            <div class="section">
                <span class="section-label">Transformace Panelu</span>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button class="btn" onclick="Transform.flipH()">↔ Překlopit</button>
                    <button class="btn" onclick="Transform.invert()">🌓 Invertovat</button>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Rozměry Panelu</span>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="inp-w" value="112" style="width: 100%; background: #000; border: 1px solid var(--simt-border); color: var(--simt-orange); padding: 8px; border-radius: 5px; font-family: var(--font-mono);" onchange="Core.resize()">
                    <input type="number" id="inp-h" value="19" style="width: 100%; background: #000; border: 1px solid var(--simt-border); color: var(--simt-orange); padding: 8px; border-radius: 5px; font-family: var(--font-mono);" onchange="Core.resize()">
                </div>
                <div style="margin-top: 15px;">
                    <button class="btn" style="width: 100%;" onclick="Core.setPreset(120, 20)">120x20 (SIMT Wide)</button>
                </div>
            </div>

            <div style="margin-top: auto;">
                <button class="btn btn-danger" style="width: 100%;" onclick="Core.clearAll()">🗑️ VYMAZAT CELÝ PANEL</button>
            </div>
        </aside>

        <main id="viewport">
            <div class="panel-frame">
                <div class="canvas-container" id="canvas-root">
                    <canvas id="buse-canvas"></canvas>
                </div>
            </div>
        </main>

        <footer>
            <div id="st-pos">X: 0 Y: 0</div>
            <div id="st-info">READY | SIMT BUSE PANEL SIMULATOR</div>
            <div id="st-save">AUTOSAVE AKTIVNÍ</div>
        </footer>

    </div>

    <div id="toast-container"></div>

    <script>
        
        /**
         * CORE ENGINE: Hlavní řídící objekt aplikace
         */
        const Core = {
            canvas: null,
            ctx: null,
            state: {
                isDrawing: false,
                tool: 'pen',
                color: '#ff8c00',
                brushSize: 1,
                zoom: 12,
                history: [],
                lastPos: { x: 0, y: 0 }
            },

            /**
             * Inicializace systému
             */
            init() {
                this.canvas = document.getElementById('buse-canvas');
                this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });

                // Event Listeners
                this.canvas.addEventListener('mousedown', (e) => this.handleDown(e));
                window.addEventListener('mousemove', (e) => this.handleMove(e));
                window.addEventListener('mouseup', () => this.handleUp());
                
                // Keyboard shortcuts
                window.addEventListener('keydown', (e) => {
                    if(e.ctrlKey && e.key === 'z') this.undo();
                    if(e.key === 'g') this.setTool('fill');
                    if(e.key === 'p') this.setTool('pen');
                    if(e.key === 'e') this.setTool('erase');
                });

                this.resize(true);
                this.storage.load();
                UI.updateBrush();
                
                console.log("BUSE SIMT Engine v17 Loaded.");
            },

            /**
             * Výpočet souřadnic s ohledem na zoom a DPI
             */
            getCoords(e) {
                const rect = this.canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                return {
                    x: Math.floor((clientX - rect.left) * (this.canvas.width / rect.width)),
                    y: Math.floor((clientY - rect.top) * (this.canvas.height / rect.height))
                };
            },

            /**
             * RESIZE LOGIC
             */
            resize(init = false) {
                const w = parseInt(document.getElementById('inp-w').value) || 112;
                const h = parseInt(document.getElementById('inp-h').value) || 19;
                
                let backup = null;
                if(!init) backup = this.ctx.getImageData(0,0,this.canvas.width, this.canvas.height);

                this.canvas.width = w;
                this.canvas.height = h;

                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0,0,w,h);
                
                if(backup) this.ctx.putImageData(backup, 0, 0);

                UI.autoZoom();
                this.pushHistory();
            },

            setPreset(w, h) {
                document.getElementById('inp-w').value = w;
                document.getElementById('inp-h').value = h;
                this.resize();
                UI.notify(`Rozměr změněn na ${w}x${h}`);
            },

            /**
             * DRAW ENGINE: Pixel-level manipulace
             */
            draw(x, y) {
                const ctx = this.ctx;
                ctx.fillStyle = (this.state.tool === 'erase') ? '#000000' : this.state.color;
                
                if(this.state.brushSize === 1) {
                    ctx.fillRect(x, y, 1, 1);
                } else {
                    const offset = Math.floor(this.state.brushSize / 2);
                    ctx.fillRect(x - offset, y - offset, this.state.brushSize, this.state.brushSize);
                }
            },

            drawLine(p1, p2) {
                const ctx = this.ctx;
                ctx.fillStyle = this.state.color;
                let x0 = p1.x, y0 = p1.y, x1 = p2.x, y1 = p2.y;
                let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
                let dy = Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
                let err = (dx > dy ? dx : -dy) / 2;
                while(true) {
                    ctx.fillRect(x0, y0, 1, 1);
                    if(x0 === x1 && y0 === y1) break;
                    let e2 = err;
                    if(e2 > -dx) { err -= dy; x0 += sx; }
                    if(e2 < dy) { err += dx; y0 += sy; }
                }
            },

            floodFill(startX, startY, fillHex) {
                const width = this.canvas.width, height = this.canvas.height;
                const img = this.ctx.getImageData(0,0,width,height);
                const data = img.data;

                const getCol = (x, y) => {
                    const i = (y * width + x) * 4;
                    return [data[i], data[i+1], data[i+2]];
                };

                const target = getCol(startX, startY);
                const fill = UI.hexToRgb(fillHex);
                
                if(target[0] === fill.r && target[1] === fill.g && target[2] === fill.b) return;

                const stack = [[startX, startY]];
                while(stack.length) {
                    const [x, y] = stack.pop();
                    if(x < 0 || x >= width || y < 0 || y >= height) continue;
                    const curr = getCol(x, y);
                    if(curr[0] === target[0] && curr[1] === target[1] && curr[2] === target[2]) {
                        const i = (y * width + x) * 4;
                        data[i] = fill.r; data[i+1] = fill.g; data[i+2] = fill.b; data[i+3] = 255;
                        stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
                    }
                }
                this.ctx.putImageData(img, 0, 0);
            },

            /**
             * INPUT HANDLERS
             */
            handleDown(e) {
                const pos = this.getCoords(e);
                this.state.isDrawing = true;
                this.state.lastPos = pos;
                
                if(this.state.tool === 'fill') {
                    this.floodFill(pos.x, pos.y, this.state.color);
                    this.pushHistory();
                } else {
                    this.draw(pos.x, pos.y);
                }
            },

            handleMove(e) {
                const pos = this.getCoords(e);
                document.getElementById('st-pos').innerText = `X: ${pos.x} Y: ${pos.y}`;
                
                if(this.state.isDrawing && (this.state.tool === 'pen' || this.state.tool === 'erase')) {
                    this.drawLine(this.state.lastPos, pos);
                    this.state.lastPos = pos;
                }
            },

            handleUp() {
                if(this.state.isDrawing) {
                    this.state.isDrawing = false;
                    this.pushHistory();
                    this.storage.save();
                }
            },

            /**
             * STATE & TOOLS
             */
            setTool(t) {
                this.state.tool = t;
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('btn-active'));
                document.getElementById('t-' + t).classList.add('btn-active');
                UI.notify(`Nástroj: ${t.toUpperCase()}`);
            },

            setColor(c, id) {
                this.state.color = c;
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(this.state.tool === 'erase') this.setTool('pen');
            },

            undo() {
                if(this.state.history.length < 2) return;
                this.state.history.pop();
                this.ctx.putImageData(this.state.history[this.state.history.length - 1], 0, 0);
                UI.notify("Krok zpět");
            },

            pushHistory() {
                if(this.state.history.length > 50) this.state.history.shift();
                this.state.history.push(this.ctx.getImageData(0,0,this.canvas.width, this.canvas.height));
            },

            clearAll() {
                if(confirm("Smazat celý panel?")) {
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillRect(0,0,this.canvas.width, this.canvas.height);
                    this.pushHistory();
                    this.storage.save();
                }
            },

            /**
             * STORAGE SUB-MODULE
             */
            storage: {
                save() {
                    const data = {
                        w: Core.canvas.width,
                        h: Core.canvas.height,
                        img: Core.canvas.toDataURL()
                    };
                    localStorage.setItem('buse_simt_v17', JSON.stringify(data));
                    document.getElementById('st-save').innerText = "ULOŽENO: " + new Date().toLocaleTimeString();
                },
                load() {
                    const raw = localStorage.getItem('buse_simt_v17');
                    if(!raw) return;
                    const data = JSON.parse(raw);
                    document.getElementById('inp-w').value = data.w;
                    document.getElementById('inp-h').value = data.h;
                    const img = new Image();
                    img.onload = () => {
                        Core.resize(true);
                        Core.ctx.drawImage(img, 0, 0);
                        Core.pushHistory();
                    };
                    img.src = data.img;
                }
            }
        };

        /**
         * TRANSFORM MODULE: Pokročilé operace s pixely
         */
        const Transform = {
            flipH() {
                const w = Core.canvas.width, h = Core.canvas.height;
                const temp = Core.ctx.getImageData(0,0,w,h);
                Core.ctx.clearRect(0,0,w,h);
                Core.ctx.save();
                Core.ctx.translate(w, 0);
                Core.ctx.scale(-1, 1);
                const img = new Image();
                img.onload = () => {
                    Core.ctx.drawImage(img, 0, 0);
                    Core.pushHistory();
                };
                img.src = Core.canvas.toDataURL();
                Core.ctx.restore();
                UI.notify("Překlopeno vodorovně");
            },

            invert() {
                const img = Core.ctx.getImageData(0,0,Core.canvas.width, Core.canvas.height);
                for(let i=0; i<img.data.length; i+=4) {
                    if(img.data[i+3] > 0) { // Pokud pixel není průhledný/černý
                        img.data[i] = 255 - img.data[i];
                        img.data[i+1] = 255 - img.data[i+1];
                        img.data[i+2] = 255 - img.data[i+2];
                    }
                }
                Core.ctx.putImageData(img, 0, 0);
                Core.pushHistory();
                UI.notify("Barvy invertovány");
            }
        };

        /**
         * UI MODULE: Vizuální interakce
         */
        const UI = {
            notify(msg) {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerText = msg;
                container.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            },

            updateBrush() {
                const val = document.getElementById('brush-size').value;
                Core.state.brushSize = parseInt(val);
                document.getElementById('brush-txt').innerText = val + 'px';
            },

            autoZoom() {
                const cvs = Core.canvas;
                const zoom = cvs.width < 120 ? 12 : 8;
                cvs.style.width = (cvs.width * zoom) + "px";
                cvs.style.height = (cvs.height * zoom) + "px";
                
                // Úprava DOT-matrix mřížky na pozadí
                const container = document.getElementById('canvas-root');
                container.style.backgroundSize = `${zoom}px ${zoom}px`;
            },

            hexToRgb(hex) {
                const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
                return {r, g, b};
            }
        };

        /**
         * IO MODULE: Export a Import
         */
        const IO = {
            export() {
                const link = document.createElement('a');
                link.download = `SIMT_BUSE_${Date.now()}.png`;
                link.href = Core.canvas.toDataURL('image/png');
                link.click();
                UI.notify("Exportováno do PNG!");
            }
        };

        // RUN
        window.onload = () => Core.init();
        window.onresize = () => UI.autoZoom();

    </script>
</body>
</html>
