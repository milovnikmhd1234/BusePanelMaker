<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petr's Plays CZ - Pixel Editor</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { background: #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: center; }
        .canvas-container { background: #fff; line-height: 0; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; border: 2px solid #555; }
        canvas { image-rendering: pixelated; max-width: 100%; height: auto; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-orange { background: #ff8c00; color: white; }
        .btn-green { background: #4caf50; color: white; }
        .btn-delete { background: #f44336; color: white; }
        .btn-download { background: #2196f3; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        button.active { outline: 3px solid white; }
        input { padding: 8px; width: 60px; border-radius: 5px; border: none; }
        label { font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🎨 Petr's Plays CZ: Pixel Art Tool</h2>

    <div class="controls">
        <!-- Rozlišení -->
        <div>
            <label>Šířka:</label>
            <input type="number" id="widthInput" value="16" min="1" max="100">
            <label>Výška:</label>
            <input type="number" id="heightInput" value="16" min="1" max="100">
            <button onclick="initCanvas()" class="btn-green">Nastavit plochu</button>
        </div>

        <hr style="width:100%; border: 0.5px solid #444;">

        <!-- Barvy a nástroje -->
        <button id="colorOrange" class="btn-orange active" onclick="setTool('#ff8c00')">Oranžová</button>
        <button id="colorGreen" class="btn-green" onclick="setTool('#4caf50')">Zelená</button>
        <button id="eraser" style="background: #eee; color: #333;" onclick="setTool('eraser')">Guma 🧽</button>
        
        <!-- Akce -->
        <button class="btn-delete" onclick="clearCanvas()">Vymazat vše 🗑️</button>
        <button class="btn-download" onclick="download('png')">Stáhnout PNG</button>
        <button class="btn-download" onclick="download('jpg')">Stáhnout JPG</button>
    </div>

    <div class="canvas-container">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        let currentColor = '#ff8c00';
        let isEraser = false;
        let isDrawing = false;

        // Inicializace plochy
        function initCanvas() {
            const w = document.getElementById('widthInput').value;
            const h = document.getElementById('heightInput').value;
            canvas.width = w;
            canvas.height = h;
            
            // Zvětšení zobrazení (zoom), aby to nebylo malinké
            canvas.style.width = (w * 20) + 'px'; 
            
            // Vyčištění na bílo (kvůli JPG)
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, w, h);
        }

        // Nastavení nástroje
        function setTool(tool) {
            isEraser = (tool === 'eraser');
            if (!isEraser) currentColor = tool;
            
            // Vizuální zpětná vazba tlačítek
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            if (isEraser) document.getElementById('eraser').classList.add('active');
            else if (currentColor === '#ff8c00') document.getElementById('colorOrange').classList.add('active');
            else if (currentColor === '#4caf50') document.getElementById('colorGreen').classList.add('active');
        }

        // Kreslení "teček" (pixelů)
        function draw(e) {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);

            ctx.fillStyle = isEraser ? "#ffffff" : currentColor;
            ctx.fillRect(x, y, 1, 1);
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);

        // Vymazat plochu
        function clearCanvas() {
            if(confirm("Opravdu vymazat celý obrázek?")) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // Stahování
        function download(format) {
            const link = document.createElement('a');
            link.download = `pixel-art.${format}`;
            link.href = canvas.toDataURL(`image/${format === 'jpg' ? 'jpeg' : 'png'}`);
            link.click();
        }

        // První spuštění
        initCanvas();
    </script>
</body>
</html>
