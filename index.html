<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSE Panel Maker v6</title>
    <style>
        :root {
            --orange: #ff8c00;
            --green: #4caf50;
            --blue: #2196f3;
            --dark-bg: #121212;
            --panel-bg: #222;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--dark-bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        /* Horní ovládací panel */
        .toolbar {
            background: var(--panel-bg);
            padding: 15px;
            border-bottom: 2px solid #444;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: flex-end;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .tool-group { display: flex; flex-direction: column; gap: 5px; }
        .tool-group label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: bold; }

        input[type="number"], input[type="range"] {
            background: #111;
            border: 1px solid #555;
            color: var(--orange);
            padding: 8px;
            border-radius: 4px;
            width: 80px;
            font-weight: bold;
        }

        /* Tlačítka */
        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            transition: 0.2s;
            color: white;
            background: #444;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-ora { background: var(--orange); color: black; }
        .btn-gre { background: var(--green); color: black; }
        .btn-fill { background: #673ab7; }
        .btn-save { background: var(--blue); }
        .btn-delete { background: #f44336; }
        
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button.active { outline: 3px solid white; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* Hlavní pracovní plocha s posuvem */
        .viewport {
            flex: 1;
            overflow: auto; /* Tady probíhá ten swipe pro dlouhé panely */
            padding: 40px;
            background: #1a1a1a;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            -webkit-overflow-scrolling: touch;
        }

        .canvas-container {
            background: #000;
            border: 2px solid #555;
            line-height: 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        canvas { 
            image-rendering: pixelated; 
            background-image:
                linear-gradient(to right, #222 1px, transparent 1px),
                linear-gradient(to bottom, #222 1px, transparent 1px);
            touch-action: none; /* Prst na plátně kreslí, prst mimo plátno posouvá */
        }

        .status-bar {
            background: #000;
            padding: 8px;
            font-family: monospace;
            font-size: 13px;
            color: var(--orange);
            text-align: center;
            border-top: 1px solid #333;
        }

        .hint { color: #666; font-size: 11px; }
    </style>
</head>
<body>

<div class="toolbar">
    <!-- Rozměry -->
    <div class="tool-group">
        <label>Vodorovně (Šířka)</label>
        <input type="number" id="wIn" value="120" oninput="resizeCanvas()">
    </div>
    <div class="tool-group">
        <label>Svisle (Výška)</label>
        <input type="number" id="hIn" value="20" oninput="resizeCanvas()">
    </div>
    <div class="tool-group">
        <label>Zoom (Lupa)</label>
        <input type="range" id="zIn" min="5" max="50" value="15" oninput="updateZoom()">
    </div>

    <!-- Barvy -->
    <div class="tool-group">
        <label>Barva diod</label>
        <div style="display:flex; gap:5px;">
            <button id="bOra" class="btn-ora active" onclick="setMode('#ff8c00')">Oranžová</button>
            <button id="bGre" class="btn-gre" onclick="setMode('#4caf50')">Zelená</button>
        </div>
    </div>

    <!-- Funkce -->
    <div class="tool-group">
        <label>Nástroje</label>
        <div style="display:flex; gap:5px;">
            <button id="bFill" class="btn-fill" onclick="setMode('fill')">Vyplnit oblast</button>
            <button id="bErase" onclick="setMode('erase')">Guma 🧽</button>
        </div>
    </div>

    <!-- Export -->
    <div class="tool-group">
        <label>Akce</label>
        <div style="display:flex; gap:5px;">
            <button class="btn-delete" onclick="clearCanvas()">Vymazat vše 🗑️</button>
            <button class="btn-save" onclick="download()">Uložit PNG 💾</button>
        </div>
    </div>
</div>

<div class="viewport">
    <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<div class="status-bar" id="stat">
    Režim: Kreslení (Oranžová) | Rozlišení: 120x20
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const stat = document.getElementById('stat');

    let currentColor = '#ff8c00';
    let mode = 'draw'; // draw, erase, fill
    let isDrawing = false;
    let fillPoint1 = null;

    // Inicializace a změna velikosti bez ztráty dat
    function resizeCanvas() {
        const w = parseInt(document.getElementById('wIn').value) || 1;
        const h = parseInt(document.getElementById('hIn').value) || 1;
        
        // Záloha aktuální kresby
        const tempImageData = ctx.getImageData(0, 0, canvas.width || 1, canvas.height || 1);
        
        canvas.width = w;
        canvas.height = h;
        
        // Vyplnění pozadí na černo
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, w, h);
        
        // Navrácení dat
        ctx.putImageData(tempImageData, 0, 0);
        
        updateZoom();
        updateStatus();
    }

    function updateZoom() {
        const z = document.getElementById('zIn').value;
        canvas.style.width = (canvas.width * z) + 'px';
        canvas.style.height = (canvas.height * z) + 'px';
        canvas.style.backgroundSize = `${z}px ${z}px`;
    }

    function setMode(m) {
        fillPoint1 = null;
        if (m === 'erase') mode = 'erase';
        else if (m === 'fill') mode = 'fill';
        else {
            mode = 'draw';
            currentColor = m;
        }

        // UI tlačítka
        document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
        if (mode === 'erase') document.getElementById('bErase').classList.add('active');
        else if (mode === 'fill') document.getElementById('bFill').classList.add('active');
        else if (currentColor === '#ff8c00') document.getElementById('bOra').classList.add('active');
        else if (currentColor === '#4caf50') document.getElementById('bGre').classList.add('active');
        
        updateStatus();
    }

    function updateStatus() {
        let txt = `Rozlišení: ${canvas.width}x${canvas.height} | Režim: `;
        if (mode === 'fill') txt += "VYPLŇOVÁNÍ (Klikni na 2 body)";
        else if (mode === 'erase') txt += "GUMA";
        else txt += "KRESLENÍ (" + (currentColor === '#ff8c00' ? "Oranžová" : "Zelená") + ")";
        stat.innerText = txt;
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const z = document.getElementById('zIn').value;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: Math.floor((clientX - rect.left) / z),
            y: Math.floor((clientY - rect.top) / z)
        };
    }

    function draw(e) {
        const pos = getMousePos(e);
        if (pos.x < 0 || pos.x >= canvas.width || pos.y < 0 || pos.y >= canvas.height) return;

        if (mode === 'fill') {
            if (e.type === 'mousedown' || e.type === 'touchstart') {
                if (!fillPoint1) {
                    fillPoint1 = pos;
                    stat.innerText = "Bod 1 nastaven. Klikni na protější roh.";
                } else {
                    const xStart = Math.min(fillPoint1.x, pos.x);
                    const yStart = Math.min(fillPoint1.y, pos.y);
                    const w = Math.abs(fillPoint1.x - pos.x) + 1;
                    const h = Math.abs(fillPoint1.y - pos.y) + 1;
                    ctx.fillStyle = currentColor;
                    ctx.fillRect(xStart, yStart, w, h);
                    fillPoint1 = null;
                    updateStatus();
                }
            }
        } else {
            ctx.fillStyle = (mode === 'erase') ? "#000000" : currentColor;
            ctx.fillRect(pos.x, pos.y, 1, 1);
        }
    }

    // Eventy pro PC i Mobil
    canvas.addEventListener('mousedown', (e) => { if(mode!=='fill') isDrawing = true; draw(e); });
    canvas.addEventListener('mousemove', (e) => { if(isDrawing) draw(e); });
    window.addEventListener('mouseup', () => isDrawing = false);

    canvas.addEventListener('touchstart', (e) => { 
        if(e.touches.length === 1) {
            if(mode!=='fill') isDrawing = true; 
            draw(e); 
            e.preventDefault(); 
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => { 
        if(isDrawing && e.touches.length === 1) { 
            draw(e); 
            e.preventDefault(); 
        }
    }, {passive: false});

    window.addEventListener('touchend', () => isDrawing = false);

    function clearCanvas() {
        if(confirm("Opravdu vymazat celý panel?")) {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    function download() {
        const link = document.createElement('a');
        link.download = `buse-panel-${canvas.width}x${canvas.height}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // První start
    resizeCanvas();
</script>

</body>
</html>
