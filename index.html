<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIMT BUSE Editor Mobile</title>
    <style>
        :root {
            --buse-orange: #ffaa00;
            --ui-bg: #1a1a1a;
            --panel-bg: #000;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Horní lišta v SIMT stylu */
        header {
            background: #252525;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid #444;
            font-size: 13px;
            align-items: center;
        }

        .brand { font-weight: bold; color: #ffaa00; margin-right: 10px; }

        select, input {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            padding: 5px;
            border-radius: 3px;
        }

        /* Oblast s panelem */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: #111;
            overflow: auto;
        }

        .canvas-container {
            position: relative;
            background: #000;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* Ovládací panel dole pro mobil */
        footer {
            background: var(--ui-bg);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid #444;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input[type="text"] { flex: 1; padding: 12px; font-size: 16px; }

        button {
            background: var(--buse-orange);
            color: #000;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }

        button.export { background: #444; color: #fff; }

        /* Mřížka (Grid overlay) */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; pointer-events: none;
            width: 100%; height: 100%;
            opacity: 0.15;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">SIMT EDITOR</div>
    <div>
        Typ: 
        <select id="typeSelector">
            <option value="v1">v1 - Hlavní (140x19)</option>
            <option value="v2">v2 - Boční s č. (110x19)</option>
            <option value="v3">v3 - Boční bez č. (85x19)</option>
            <option value="v4">v4 - Zadní (28x19)</option>
        </select>
    </div>
    <div id="res-indicator">140 x 19</div>
</header>

<div id="viewport">
    <div class="canvas-container">
        <canvas id="buseCanvas"></canvas>
    </div>
</div>

<footer>
    <div class="controls-row">
        <input type="text" id="lineInput" placeholder="Linka" style="max-width: 70px;">
        <input type="text" id="textInput" placeholder="Cílová stanice">
    </div>
    <div class="controls-row">
        <button onclick="render()">Aktualizovat</button>
        <button class="export" onclick="exportImage()">Export</button>
    </div>
</footer>

<script>
    const canvas = document.getElementById('buseCanvas');
    const ctx = canvas.getContext('2d');
    const typeSelector = document.getElementById('typeSelector');
    
    // Konfigurace typů panelů
    const configs = {
        v1: { w: 140, h: 19, dot: 4 },
        v2: { w: 110, h: 19, dot: 5 },
        v3: { w: 85, h: 19, dot: 6 },
        v4: { w: 28, h: 19, dot: 10 }
    };

    // Bitmapový font (zjednodušený pro ukázku, lze doplnit další znaky)
    const FONT = {
        'A': [0x7E, 0x11, 0x11, 0x7E], 'B': [0x7F, 0x49, 0x49, 0x36], 'C': [0x3E, 0x41, 0x41, 0x22],
        'D': [0x7F, 0x41, 0x41, 0x3E], 'E': [0x7F, 0x49, 0x49, 0x41], 'F': [0x7F, 0x09, 0x09, 0x01],
        'H': [0x7F, 0x08, 0x08, 0x7F], 'I': [0x41, 0x7F, 0x41], 'L': [0x7F, 0x40, 0x40, 0x40],
        'M': [0x7F, 0x02, 0x0C, 0x02, 0x7F], 'N': [0x7F, 0x04, 0x08, 0x7F], 'O': [0x3E, 0x41, 0x41, 0x3E],
        'P': [0x7F, 0x09, 0x09, 0x06], 'R': [0x7F, 0x09, 0x19, 0x66], 'S': [0x26, 0x49, 0x49, 0x32],
        'T': [0x01, 0x01, 0x7F, 0x01, 0x01], 'U': [0x3F, 0x40, 0x40, 0x3F], 'V': [0x1F, 0x20, 0x40, 0x1F],
        '0': [0x3E, 0x41, 0x41, 0x3E], '1': [0x42, 0x7F, 0x40], '2': [0x62, 0x51, 0x49, 0x46],
        '3': [0x22, 0x49, 0x49, 0x36], '4': [0x18, 0x14, 0x12, 0x7F], '5': [0x27, 0x45, 0x45, 0x39],
        '6': [0x3C, 0x4A, 0x49, 0x30], '7': [0x01, 0x71, 0x09, 0x07], '8': [0x36, 0x49, 0x49, 0x36],
        '9': [0x06, 0x49, 0x49, 0x3E], ' ': [0x00, 0x00], '-': [0x08, 0x08, 0x08], '.': [0x40], ',': [0x40, 0x20]
    };

    let currentConfig = configs.v1;

    function initCanvas() {
        const type = typeSelector.value;
        currentConfig = configs[type];
        
        // Nastavení fyzické velikosti canvasu
        canvas.width = currentConfig.w * currentConfig.dot;
        canvas.height = currentConfig.h * currentConfig.dot;
        
        document.getElementById('res-indicator').innerText = `${currentConfig.w} x ${currentConfig.h}`;
        render();
    }

    function drawChar(char, x, y, size) {
        const bitmap = FONT[char.toUpperCase()] || FONT[' '];
        ctx.fillStyle = "#ffaa00";
        
        bitmap.forEach((col, i) => {
            for (let bit = 0; bit < 8; bit++) {
                if ((col >> bit) & 1) {
                    ctx.fillRect(
                        (x + i) * currentConfig.dot, 
                        (y + bit) * currentConfig.dot, 
                        currentConfig.dot - 1, 
                        currentConfig.dot - 1
                    );
                }
            }
        });
        return bitmap.length + 1;
    }

    function render() {
        // Vyčistit pozadí (simulace rastru)
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Nakreslit prázdné body (grid)
        ctx.fillStyle = "#111";
        for(let i=0; i<currentConfig.w; i++) {
            for(let j=0; j<currentConfig.h; j++) {
                ctx.fillRect(i*currentConfig.dot, j*currentConfig.dot, currentConfig.dot-1, currentConfig.dot-1);
            }
        }

        const line = document.getElementById('lineInput').value;
        const text = document.getElementById('textInput').value;

        ctx.shadowBlur = 5;
        ctx.shadowColor = "#ffaa00";

        // Vykreslení podle typu panelu
        if (typeSelector.value !== 'v4') {
            // Číslo linky
            let xOff = 2;
            for(let c of line) { xOff += drawChar(c, xOff, 2, 1); }
            
            // Text cíle
            let tOff = (typeSelector.value === 'v3') ? 2 : 30;
            for(let c of text) { tOff += drawChar(c, tOff, 2, 1); }
        } else {
            // Zadní panel jen číslo
            let xOff = 2;
            for(let c of line) { xOff += drawChar(c, xOff, 5, 1); }
        }
        ctx.shadowBlur = 0;
    }

    function exportImage() {
        const link = document.createElement('a');
        link.download = `buse_${typeSelector.value}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    typeSelector.addEventListener('change', initCanvas);
    window.addEventListener('load', initCanvas);
</script>

</body>
</html>
