<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSE SIMT MASTER v18 | Studio Edition</title>
    
    <style>
        :root {
            --buse-orange: #ff8c00;
            --buse-orange-dim: #995400;
            --buse-bg: #0a0a0c;
            --buse-sidebar: #121216;
            --buse-card: #1a1a20;
            --buse-border: rgba(255, 140, 0, 0.15);
            --text-main: #e0e0e0;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --shadow-glow: 0 0 20px rgba(255, 140, 0, 0.2);
        }

        * { box-sizing: border-box; cursor: default; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--buse-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* HLAVNÍ KONTEJNER */
        .master-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* BOČNÍ OVLÁDACÍ PANEL */
        .control-sidebar {
            width: 350px;
            background: var(--buse-sidebar);
            border-right: 1px solid var(--buse-border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 100;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .brand-zone {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--buse-border);
        }

        .brand-title {
            color: var(--buse-orange);
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: var(--shadow-glow);
        }

        /* SEKCE */
        .ui-section { margin-bottom: 25px; }
        .ui-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 800;
        }

        /* TLAČÍTKA */
        .btn {
            background: var(--buse-card);
            border: 1px solid var(--buse-border);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover:not(.btn-active) {
            background: #25252d;
            border-color: var(--buse-orange);
        }

        .btn-active {
            background: var(--buse-orange) !important;
            color: #000 !important;
            font-weight: 800;
            box-shadow: var(--shadow-glow);
        }

        .btn-export {
            background: var(--buse-orange);
            color: #000;
            font-size: 16px;
            font-weight: 900;
            padding: 18px;
            margin-top: 10px;
            border: none;
            box-shadow: 0 5px 20px rgba(255, 140, 0, 0.4);
        }

        .btn-export:hover {
            transform: translateY(-2px);
            background: #ffaa33;
        }

        /* PALETA */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .swatch {
            aspect-ratio: 1;
            border-radius: 4px;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .swatch.active {
            border-color: #fff;
            transform: scale(1.1);
        }

        /* VIEWPORT S PANELEM */
        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: 
                linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            overflow: auto;
            position: relative;
            padding: 50px;
        }

        .panel-container {
            position: relative;
            background: #000;
            padding: 15px;
            border: 10px solid #222;
            border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        /* Šroubky v rozích panelu */
        .panel-container::before, .panel-container::after {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            background: #333; border-radius: 50%;
        }
        .panel-container::before { top: 2px; left: 2px; box-shadow: 0 11px 0 #333; }
        .panel-container::after { top: 2px; right: 2px; box-shadow: 0 11px 0 #333; }

        canvas {
            display: block;
            image-rendering: pixelated;
            background: #000;
            cursor: crosshair;
        }

        /* STATY */
        .stat-bar {
            position: fixed;
            bottom: 0; right: 0; left: 350px;
            height: 35px;
            background: #000;
            border-top: 1px solid var(--buse-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: #555;
            justify-content: space-between;
        }

        /* INPUTS */
        input[type="number"] {
            background: #000;
            border: 1px solid var(--buse-border);
            color: var(--buse-orange);
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            font-family: var(--font-mono);
            font-weight: 800;
        }

        /* TOAST */
        #toast-wrap {
            position: fixed; top: 20px; right: 20px;
            z-index: 1000;
        }
        .toast {
            background: var(--buse-card);
            border-left: 5px solid var(--buse-orange);
            padding: 15px 25px;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

    <div class="master-wrapper">
        
        <aside class="control-sidebar">
            <div class="brand-zone">
                <h1 class="brand-title">BUSE MASTER</h1>
                <div style="font-size: 9px; color: #555; margin-top: 4px;">SIMT EDITION v18.0</div>
            </div>

            <div class="ui-section">
                <button class="btn btn-export" onclick="IO.export()">💾 EXPORTOVAT PNG</button>
            </div>

            <div class="ui-section">
                <span class="ui-label">Metody Kreslení</span>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button id="t-pen" class="btn btn-active" onclick="App.setTool('pen')">Tužka</button>
                    <button id="t-erase" class="btn" onclick="App.setTool('erase')">Guma</button>
                    <button id="t-fill" class="btn" onclick="App.setTool('fill')">Vylít</button>
                    <button id="t-line" class="btn" onclick="App.setTool('line')">Čára</button>
                    <button id="t-rect" class="btn" onclick="App.setTool('rect')">Obdélník</button>
                </div>
            </div>

            <div class="ui-section">
                <span class="ui-label">Paleta Barev</span>
                <div class="color-grid">
                    <div class="swatch active" style="background: #ff8c00;" id="c-ora" onclick="App.setColor('#ff8c00', 'c-ora')"></div>
                    <div class="swatch" style="background: #4caf50;" id="c-gre" onclick="App.setColor('#4caf50', 'c-gre')"></div>
                    <div class="swatch" style="background: #ffffff;" id="c-whi" onclick="App.setColor('#ffffff', 'c-whi')"></div>
                    <div class="swatch" style="background: #000000; border: 1px solid #444;" id="c-bla" onclick="App.setColor('#000000', 'c-bla')"></div>
                </div>
            </div>

            <div class="ui-section">
                <span class="ui-label">Konfigurace Panelu</span>
                <div style="display: flex; gap: 10px;">
                    <div>
                        <div style="font-size: 9px; margin-bottom: 4px;">ŠÍŘKA</div>
                        <input type="number" id="w-inp" value="112" onchange="App.resize()">
                    </div>
                    <div>
                        <div style="font-size: 9px; margin-bottom: 4px;">VÝŠKA</div>
                        <input type="number" id="h-inp" value="19" onchange="App.resize()">
                    </div>
                </div>
            </div>

            <div class="ui-section">
                <span class="ui-label">Projektové Sloty</span>
                <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;">
                    <button class="btn btn-active" onclick="App.switchSlot(0)">1</button>
                    <button class="btn" onclick="App.switchSlot(1)">2</button>
                    <button class="btn" onclick="App.switchSlot(2)">3</button>
                    <button class="btn" onclick="App.switchSlot(3)">4</button>
                    <button class="btn" onclick="App.switchSlot(4)">5</button>
                </div>
            </div>

            <div class="ui-section" style="margin-top: auto;">
                <button class="btn" style="width: 100%;" onclick="App.undo()">↩ ZPĚT (Ctrl+Z)</button>
                <button class="btn" style="width: 100%; border-color: #ff4444; color: #ff4444;" onclick="App.clear()">🗑️ SMAZAT PANEL</button>
            </div>
        </aside>

        <main class="viewport" id="viewport">
            <div class="panel-container" id="panel-box">
                <canvas id="main-canvas"></canvas>
            </div>
        </main>

        <div class="stat-bar">
            <div id="st-coords">CURSOR: 0, 0</div>
            <div id="st-zoom">ZOOM: 100%</div>
            <div style="color: var(--buse-orange);">SIMT DOT-MATRIX ENGINE ACTIVE</div>
        </div>

    </div>

    <div id="toast-wrap"></div>

    <script>
        /**
         * ========================================================================================
         * BUSE MASTER ENGINE v18 - CORE JAVASCRIPT
         * ========================================================================================
         */

        const App = {
            canvas: null,
            ctx: null,
            activeSlot: 0,
            
            // Stav aplikace
            state: {
                isDrawing: false,
                tool: 'pen',
                color: '#ff8c00',
                brushSize: 1,
                history: [],
                startPos: { x: 0, y: 0 },
                tempImg: null
            },

            /**
             * Start systému
             */
            init() {
                this.canvas = document.getElementById('main-canvas');
                this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });

                // Eventy myši
                this.canvas.addEventListener('mousedown', (e) => this.handleDown(e));
                window.addEventListener('mousemove', (e) => this.handleMove(e));
                window.addEventListener('mouseup', () => this.handleUp());

                // Klávesnice
                window.addEventListener('keydown', (e) => {
                    if(e.ctrlKey && e.key === 'z') this.undo();
                });

                this.resize(true);
                this.storage.load();
                
                UI.notify("BUSE MASTER v18 připraven");
            },

            /**
             * Přepočet souřadnic
             */
            getCoords(e) {
                const rect = this.canvas.getBoundingClientRect();
                const zoom = rect.width / this.canvas.width;
                return {
                    x: Math.floor((e.clientX - rect.left) / zoom),
                    y: Math.floor((e.clientY - rect.top) / zoom)
                };
            },

            /**
             * Změna velikosti panelu
             */
            resize(init = false) {
                const w = parseInt(document.getElementById('w-inp').value) || 112;
                const h = parseInt(document.getElementById('h-inp').value) || 19;
                
                let backup = null;
                if(!init) backup = this.ctx.getImageData(0,0,this.canvas.width, this.canvas.height);

                this.canvas.width = w;
                this.canvas.height = h;
                
                // Vyčistit na černo
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0,0,w,h);
                
                if(backup) this.ctx.putImageData(backup, 0, 0);

                UI.adaptZoom();
                this.pushHistory();
            },

            /**
             * DRAW LOGIC
             */
            draw(x, y) {
                this.ctx.fillStyle = (this.state.tool === 'erase') ? '#000' : this.state.color;
                this.ctx.fillRect(x, y, 1, 1);
            },

            // Bresenhamova čára
            drawLine(p1, p2) {
                this.ctx.fillStyle = this.state.color;
                let x0 = p1.x, y0 = p1.y, x1 = p2.x, y1 = p2.y;
                let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
                let dy = Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
                let err = (dx > dy ? dx : -dy) / 2;
                while(true) {
                    this.ctx.fillRect(x0, y0, 1, 1);
                    if(x0 === x1 && y0 === y1) break;
                    let e2 = err;
                    if(e2 > -dx) { err -= dy; x0 += sx; }
                    if(e2 < dy) { err += dx; y0 += sy; }
                }
            },

            // Flood Fill
            fill(startX, startY, fillHex) {
                const w = this.canvas.width, h = this.canvas.height;
                const img = this.ctx.getImageData(0,0,w,h);
                const data = img.data;

                const getCol = (x, y) => {
                    const i = (y * w + x) * 4;
                    return [data[i], data[i+1], data[i+2]];
                };

                const target = getCol(startX, startY);
                const color = UI.hexToRgb(fillHex);
                
                if(target[0] === color.r && target[1] === color.g && target[2] === color.b) return;

                const stack = [[startX, startY]];
                while(stack.length) {
                    const [x, y] = stack.pop();
                    if(x<0||x>=w||y<0||y>=h) continue;
                    const c = getCol(x, y);
                    if(c[0] === target[0] && c[1] === target[1] && c[2] === target[2]) {
                        const i = (y * w + x) * 4;
                        data[i] = color.r; data[i+1] = color.g; data[i+2] = color.b; data[i+3] = 255;
                        stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
                    }
                }
                this.ctx.putImageData(img, 0, 0);
            },

            /**
             * EVENTY
             */
            handleDown(e) {
                const pos = this.getCoords(e);
                this.state.isDrawing = true;
                this.state.startPos = pos;
                this.state.tempImg = this.ctx.getImageData(0,0,this.canvas.width, this.canvas.height);

                if(this.state.tool === 'fill') {
                    this.fill(pos.x, pos.y, this.state.color);
                } else if(this.state.tool === 'pen' || this.state.tool === 'erase') {
                    this.draw(pos.x, pos.y);
                }
            },

            handleMove(e) {
                const pos = this.getCoords(e);
                document.getElementById('st-coords').innerText = `CURSOR: ${pos.x}, ${pos.y}`;
                
                if(!this.state.isDrawing) return;

                if(this.state.tool === 'pen' || this.state.tool === 'erase') {
                    this.drawLine(this.state.startPos, pos);
                    this.state.startPos = pos;
                } else if(this.state.tool === 'line' || this.state.tool === 'rect') {
                    this.ctx.putImageData(this.state.tempImg, 0, 0);
                    if(this.state.tool === 'line') this.drawLine(this.state.startPos, pos);
                    if(this.state.tool === 'rect') {
                        this.ctx.fillStyle = this.state.color;
                        const x = Math.min(this.state.startPos.x, pos.x), y = Math.min(this.state.startPos.y, pos.y);
                        const w = Math.abs(this.state.startPos.x - pos.x) + 1, h = Math.abs(this.state.startPos.y - pos.y) + 1;
                        this.ctx.fillRect(x, y, w, h);
                    }
                }
            },

            handleUp() {
                if(this.state.isDrawing) {
                    this.state.isDrawing = false;
                    this.pushHistory();
                    this.storage.save();
                }
            },

            /**
             * UI AKCE
             */
            setTool(t) {
                this.state.tool = t;
                document.querySelectorAll('.ui-section .btn').forEach(b => b.classList.remove('btn-active'));
                const btn = document.getElementById('t-' + t);
                if(btn) btn.classList.add('btn-active');
            },

            setColor(c, id) {
                this.state.color = c;
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },

            undo() {
                if(this.state.history.length < 2) return;
                this.state.history.pop();
                this.ctx.putImageData(this.state.history[this.state.history.length - 1], 0, 0);
            },

            pushHistory() {
                if(this.state.history.length > 50) this.state.history.shift();
                this.state.history.push(this.ctx.getImageData(0,0,this.canvas.width, this.canvas.height));
            },

            clear() {
                if(confirm("Smazat vše?")) {
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillRect(0,0,this.canvas.width, this.canvas.height);
                    this.pushHistory();
                    this.storage.save();
                }
            },

            switchSlot(i) {
                this.storage.save();
                this.activeSlot = i;
                document.querySelectorAll('.ui-section button').forEach((b,idx) => {
                   if(b.innerText == (i+1)) b.classList.add('btn-active');
                   else if (!isNaN(b.innerText)) b.classList.remove('btn-active');
                });
                this.storage.load();
                UI.notify(`Přepnuto na slot ${i+1}`);
            },

            /**
             * STORAGE
             */
            storage: {
                save() {
                    const data = {
                        w: App.canvas.width,
                        h: App.canvas.height,
                        img: App.canvas.toDataURL()
                    };
                    localStorage.setItem(`buse_slot_${App.activeSlot}`, JSON.stringify(data));
                },
                load() {
                    const raw = localStorage.getItem(`buse_slot_${App.activeSlot}`);
                    if(!raw) return;
                    const data = JSON.parse(raw);
                    document.getElementById('w-inp').value = data.w;
                    document.getElementById('h-inp').value = data.h;
                    const img = new Image();
                    img.onload = () => {
                        App.resize(true);
                        App.ctx.drawImage(img, 0, 0);
                        App.pushHistory();
                    };
                    img.src = data.img;
                }
            }
        };

        /**
         * UI UTILS
         */
        const UI = {
            notify(txt) {
                const w = document.getElementById('toast-wrap');
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerText = txt;
                w.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            },

            adaptZoom() {
                const cvs = App.canvas;
                const view = document.getElementById('viewport');
                const ratio = (view.clientWidth - 100) / cvs.width;
                const zoom = Math.floor(Math.min(ratio, 15));
                cvs.style.width = (cvs.width * zoom) + "px";
                cvs.style.height = (cvs.height * zoom) + "px";
                document.getElementById('st-zoom').innerText = `ZOOM: ${zoom * 100}%`;
            },

            hexToRgb(hex) {
                const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
                return {r, g, b};
            }
        };

        const IO = {
            export() {
                const link = document.createElement('a');
                link.download = `BUSE_PANEL_SLOT_${App.activeSlot + 1}.png`;
                link.href = App.canvas.toDataURL();
                link.click();
                UI.notify("Exportováno!");
            }
        };

        window.onload = () => App.init();
        window.onresize = () => UI.adaptZoom();

    </script>
</body>
</html>
