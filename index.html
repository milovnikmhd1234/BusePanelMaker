<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIMT BUSE Editor Pro - Precision Spacing</title>
    <style>
        :root {
            --buse-color: #ff9d00;
            --panel-bg: #000000;
            --ui-bg: #1e1e1e;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* SIMT LIŠTA */
        header {
            background: #252525;
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            border-bottom: 2px solid #3c3c3c;
            font-size: 13px;
            z-index: 10;
        }

        .simt-brand {
            font-weight: bold;
            color: var(--buse-color);
            border: 1px solid var(--buse-color);
            padding: 2px 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-box {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        select, input[type="number"] {
            background: #000000;
            color: #ffffff;
            border: 1px solid #555555;
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        select:focus, input:focus {
            border-color: var(--buse-color);
            outline: none;
        }

        /* VIEWPORT S RESIZEM */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: radial-gradient(circle, #1c1c1c 0%, #000000 100%);
            overflow: auto;
        }

        .buse-frame {
            position: relative;
            border: 10px solid #282828;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            background: #000000;
            padding: 2px;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* OVLÁDACÍ PRVKY PRO MOBIL */
        footer {
            background: var(--ui-bg);
            border-top: 2px solid #333333;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input[type="text"] {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            background: #000000;
            color: #ffffff;
            border: 1px solid #444444;
        }

        .input-group input[type="text"]:focus {
            border-color: var(--buse-color);
            outline: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-refresh { background: var(--buse-color); color: #000000; }
        .btn-refresh:active { background: #ffb433; }
        .btn-save { background: #444444; color: #ffffff; }
        .btn-save:active { background: #555555; }

        @media (max-width: 600px) {
            header { gap: 8px; padding: 8px; }
            footer { padding: 10px; }
            .buse-frame { transform: scale(0.95); }
        }
    </style>
</head>
<body>

<header>
    <div class="simt-brand">SIMT BUSE</div>
    
    <div class="control-box">
        Šířka: <input type="number" id="pWidth" value="140" min="20" max="300" style="width: 55px;">
    </div>

    <div class="control-box">
        Kategorie fontu: 
        <select id="pFont">
            <option value="max_bold">Font největší tučný</option>
            <option value="max">Font největší</option>
            <option value="big_bold">Font velký tučný</option>
            <option value="big" selected>Font velký</option>
            <option value="mid">Font střední</option>
            <option value="small_bold">Font malý tučný</option>
            <option value="small">Font malý</option>
            <option value="min">Font nejmenší</option>
        </select>
    </div>

    <div class="control-box">
        Barva: 
        <select id="pColor">
            <option value="#ff9d00">Oranžová LED</option>
            <option value="#ffffff">Bílá LED</option>
            <option value="#00b31e">Tmavě zelená DOT</option>
        </select>
    </div>
</header>

<div id="viewport">
    <div class="buse-frame">
        <canvas id="buseCanvas"></canvas>
    </div>
</div>

<footer>
    <div class="input-group">
        <input type="text" id="lineIn" placeholder="Linka" style="max-width: 75px;" value="12">
        <input type="text" id="textIn" placeholder="CÍLOVÁ STANICE" value="ŘEČKOVICE, ŠLOUP">
    </div>
    <div class="button-group">
        <button class="btn-refresh" onclick="drawBuse()">Aktualizovat</button>
        <button class="btn-save" onclick="exportPNG()">Export PNG</button>
    </div>
</footer>

<script>
/**
 * ROZŠÍŘENÁ HARDWAROVÁ BITMAPOVÁ DATA PRO SIMT BUSE PANEL
 * Každý znak je definován jako pole vertikálních bitových masek.
 */
const MATRIX_FONT = {
    'A': [0x7E, 0x11, 0x11, 0x11, 0x7E],
    'B': [0x7F, 0x49, 0x49, 0x49, 0x36],
    'C': [0x3E, 0x41, 0x41, 0x41, 0x22],
    'D': [0x7F, 0x41, 0x41, 0x22, 0x1C],
    'E': [0x7F, 0x49, 0x49, 0x49, 0x41],
    'F': [0x7F, 0x09, 0x09, 0x09, 0x01],
    'G': [0x3E, 0x41, 0x49, 0x49, 0x7A],
    'H': [0x7F, 0x08, 0x08, 0x08, 0x7F],
    'I': [0x00, 0x41, 0x7F, 0x41, 0x00],
    'J': [0x20, 0x40, 0x41, 0x3F, 0x01],
    'K': [0x7F, 0x08, 0x14, 0x22, 0x41],
    'L': [0x7F, 0x40, 0x40, 0x40, 0x40],
    'M': [0x7F, 0x02, 0x0C, 0x02, 0x7F],
    'N': [0x7F, 0x04, 0x08, 0x10, 0x7F],
    'O': [0x3E, 0x41, 0x41, 0x41, 0x3E],
    'P': [0x7F, 0x09, 0x09, 0x09, 0x06],
    'Q': [0x3E, 0x41, 0x51, 0x21, 0x5E],
    'R': [0x7F, 0x09, 0x19, 0x29, 0x46],
    'S': [0x46, 0x49, 0x49, 0x49, 0x31],
    'T': [0x01, 0x01, 0x7F, 0x01, 0x01],
    'U': [0x3F, 0x40, 0x40, 0x40, 0x3F],
    'V': [0x1F, 0x20, 0x40, 0x20, 0x1F],
    'W': [0x3F, 0x40, 0x38, 0x40, 0x3F],
    'X': [0x63, 0x14, 0x08, 0x14, 0x63],
    'Y': [0x07, 0x08, 0x70, 0x08, 0x07],
    'Z': [0x61, 0x51, 0x49, 0x45, 0x43],
    '0': [0x3E, 0x51, 0x49, 0x45, 0x3E],
    '1': [0x00, 0x42, 0x7F, 0x40, 0x00],
    '2': [0x42, 0x61, 0x51, 0x49, 0x46],
    '3': [0x21, 0x41, 0x45, 0x4B, 0x31],
    '4': [0x18, 0x14, 0x12, 0x7F, 0x10],
    '5': [0x27, 0x45, 0x45, 0x45, 0x39],
    '6': [0x3C, 0x4A, 0x49, 0x49, 0x30],
    '7': [0x01, 0x71, 0x09, 0x05, 0x03],
    '8': [0x36, 0x49, 0x49, 0x49, 0x36],
    '9': [0x06, 0x49, 0x49, 0x29, 0x1E],
    ' ': [0x00, 0x00, 0x00],
    '.': [0x40, 0x00],
    ',': [0x40, 0x20],
    '-': [0x08, 0x08, 0x08],
    // DIAKRITIKA - ČÁRKY (Příznak 0x01 na konci)
    'Á': [0x7E, 0x11, 0x11, 0x11, 0x7E, 0x01],
    'É': [0x7F, 0x49, 0x49, 0x49, 0x41, 0x01],
    'Í': [0x00, 0x41, 0x7F, 0x41, 0x00, 0x01],
    'Ó': [0x3E, 0x41, 0x41, 0x41, 0x3E, 0x01],
    'Ú': [0x3F, 0x40, 0x40, 0x40, 0x3F, 0x01],
    'Ý': [0x07, 0x08, 0x70, 0x08, 0x07, 0x01],
    // DIAKRITIKA - HÁČKY (Příznak 0x02 na konci)
    'Č': [0x3E, 0x41, 0x41, 0x41, 0x22, 0x02],
    'Ď': [0x7F, 0x41, 0x41, 0x22, 0x1C, 0x02],
    'Ě': [0x7F, 0x49, 0x49, 0x49, 0x41, 0x02],
    'Ň': [0x7F, 0x04, 0x08, 0x10, 0x7F, 0x02],
    'Ř': [0x7F, 0x09, 0x19, 0x29, 0x46, 0x02],
    'Š': [0x46, 0x49, 0x49, 0x49, 0x31, 0x02],
    'Ť': [0x01, 0x01, 0x7F, 0x01, 0x01, 0x02],
    'Ž': [0x61, 0x51, 0x49, 0x45, 0x43, 0x02],
    'Ů': [0x3F, 0x40, 0x40, 0x40, 0x3F, 0x03]
};

const canvas = document.getElementById('buseCanvas');
const ctx = canvas.getContext('2d');
const FIXED_HEIGHT = 19;
const DOT_RENDER_SIZE = 5;

// JEMNĚ SNÍŽENÉ MEZERY (SPACING) PRO OPTIMÁLNÍ ČITELNOST S DIAKRITIKOU
const CATEGORIES = {
    'max_bold':   { multX: 2,   multY: 2,   spacing: 3, accentShift: -1, bold: true  },
    'max':        { multX: 2,   multY: 2,   spacing: 2, accentShift: -1, bold: false },
    'big_bold':   { multX: 1,   multY: 2,   spacing: 2, accentShift: 0,  bold: true  },
    'big':        { multX: 1,   multY: 2,   spacing: 2, accentShift: 0,  bold: false },
    'mid':        { multX: 1,   multY: 1.5, spacing: 2, accentShift: 1,  bold: false },
    'small_bold': { multX: 1,   multY: 1.2, spacing: 1, accentShift: 2,  bold: true  },
    'small':      { multX: 1,   multY: 1,   spacing: 1, accentShift: 2,  bold: false },
    'min':        { multX: 0.8, multY: 0.8, spacing: 1, accentShift: 3,  bold: false }
};

function drawHardwareChar(char, startX, startY, cat, ledColor) {
    let bitmap = MATRIX_FONT[char.toUpperCase()];
    if (!bitmap) bitmap = MATRIX_FONT[' '];

    let width = bitmap.length;
    let hasAccent = false;
    let accentType = 0;

    if (width > 5 && (bitmap[5] === 1 || bitmap[5] === 2 || bitmap[5] === 3)) {
        hasAccent = true;
        accentType = bitmap[5];
        width = 5;
    }

    ctx.fillStyle = ledColor;
    
    // Generování těla písmene
    for (let x = 0; x < width; x++) {
        let colData = bitmap[x];
        for (let y = 0; y < 8; y++) {
            if ((colData >> y) & 1) {
                renderBlock(startX + (x * cat.multX), startY + (y * cat.multY), cat.multX, cat.multY, cat.bold);
            }
        }
    }

    // Generování diakritiky
    if (hasAccent) {
        let ax = startX + (2 * cat.multX);
        let ay = startY - (2 * cat.multY) + cat.accentShift;
        
        if (accentType === 1) {
            renderBlock(ax, ay, cat.multX, cat.multY, false);
            renderBlock(ax + cat.multX, ay - cat.multY, cat.multX, cat.multY, false);
        } else if (accentType === 2) {
            renderBlock(ax - cat.multX, ay - cat.multY, cat.multX, cat.multY, false);
            renderBlock(ax + cat.multX, ay - cat.multY, cat.multX, cat.multY, false);
            renderBlock(ax, ay, cat.multX, cat.multY, false);
        } else if (accentType === 3) {
            renderBlock(ax, ay - cat.multY, cat.multX, cat.multY, false);
            renderBlock(ax - cat.multX, ay, cat.multX, cat.multY, false);
            renderBlock(ax + cat.multX, ay, cat.multX, cat.multY, false);
        }
    }

    return Math.ceil(width * cat.multX + cat.spacing);
}

function renderBlock(bx, by, mw, mh, isBold) {
    let finalW = Math.max(1, Math.round(mw));
    let finalH = Math.max(1, Math.round(mh));
    
    if (isBold) finalW += 1;

    for (let dx = 0; dx < finalW; dx++) {
        for (let dy = 0; dy < finalH; dy++) {
            let px = Math.floor(bx + dx);
            let py = Math.floor(by + dy);
            
            if (py >= 0 && py < FIXED_HEIGHT) {
                ctx.fillRect(px * DOT_RENDER_SIZE, py * DOT_RENDER_SIZE, DOT_RENDER_SIZE - 1, DOT_RENDER_SIZE - 1);
            }
        }
    }
}

function drawBuse() {
    const pWidth = parseInt(document.getElementById('pWidth').value) || 140;
    const fontKey = document.getElementById('pFont').value;
    const ledColor = document.getElementById('pColor').value;
    const lineVal = document.getElementById('lineIn').value;
    const textVal = document.getElementById('textIn').value;

    const cat = CATEGORIES[fontKey];
    document.documentElement.style.setProperty('--buse-color', ledColor);

    canvas.width = pWidth * DOT_RENDER_SIZE;
    canvas.height = FIXED_HEIGHT * DOT_RENDER_SIZE;

    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#111111";
    for (let x = 0; x < pWidth; x++) {
        for (let y = 0; y < FIXED_HEIGHT; y++) {
            ctx.fillRect(x * DOT_RENDER_SIZE, y * DOT_RENDER_SIZE, DOT_RENDER_SIZE - 1, DOT_RENDER_SIZE - 1);
        }
    }

    ctx.shadowBlur = DOT_RENDER_SIZE * 1.1;
    ctx.shadowColor = ledColor;

    let currentX = 2;

    // Vykreslení čísla linky
    if (lineVal.trim() !== "") {
        let lineCat = CATEGORIES['big_bold'];
        for (let char of lineVal) {
            currentX += drawHardwareChar(char, currentX, 2, lineCat, ledColor);
        }
        currentX += 4; 
    }

    let startY = 3;
    if (fontKey.includes('small') || fontKey === 'min') startY = 5;
    if (fontKey === 'mid') startY = 4;

    for (let char of textVal) {
        if (currentX < pWidth - 2) {
            currentX += drawHardwareChar(char, currentX, startY, cat, ledColor);
        }
    }

    ctx.shadowBlur = 0;
}

function exportPNG() {
    const width = document.getElementById('pWidth').value;
    const link = document.createElement('a');
    link.download = `SIMT_BUSE_Matrix_${width}x19.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
}

document.getElementById('pWidth').addEventListener('input', drawBuse);
document.getElementById('pFont').addEventListener('change', drawBuse);
document.getElementById('pColor').addEventListener('change', drawBuse);

window.onload = drawBuse;
</script>

</body>
</html>
