<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIMT BUSE Editor - Custom Edition</title>
    <style>
        :root {
            --ui-bg: #1e1e1e;
            --ui-border: #333;
            --active-color: #ff9d00;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HORNÍ LIŠTA SIMT */
        header {
            background: #252525;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            border-bottom: 2px solid #444;
            font-size: 13px;
            z-index: 10;
        }

        .brand {
            font-weight: bold;
            color: #ff9d00;
            border: 1px solid #ff9d00;
            padding: 2px 6px;
            text-transform: uppercase;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        select, input[type="number"], input[type="text"] {
            background: #000;
            color: #fff;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        select:focus, input:focus {
            border-color: var(--active-color);
            outline: none;
        }

        /* ZOBRAZOVACÍ PLOCHA */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            overflow: auto;
        }

        .canvas-container {
            position: relative;
            border: 10px solid #282828;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            background: #000;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* OVLÁDÁNÍ DOLE PRO MOBIL (NA VÝŠKU) */
        footer {
            background: var(--ui-bg);
            border-top: 2px solid #444;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border-radius: 4px;
            background: #000;
            color: #fff;
            border: 1px solid #444;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-update { background: #ff9d00; color: #000; }
        .btn-export { background: #444; color: #fff; }

        label {
            font-size: 12px;
            color: #aaa;
        }

        @media (max-width: 600px) {
            .canvas-container {
                transform: scale(0.95);
                transform-origin: center;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">SIMT BUSE</div>
    
    <div class="control-item">
        Délka panelu: 
        <input type="number" id="panelWidth" value="140" min="10" max="300" style="width: 55px;">
    </div>

    <div class="control-item">
        Kategorie fontu: 
        <select id="fontCategory">
            <option value="max_bold">Font největší tučný</option>
            <option value="max">Font největší</option>
            <option value="big_bold">Font velký tučný</option>
            <option value="big" selected>Font velký</option>
            <option value="mid">Font střední</option>
            <option value="small_bold">Font malý tučný</option>
            <option value="small">Font malý</option>
            <option value="min">Font nejmenší</option>
        </select>
    </div>

    <div class="control-item">
        Barva: 
        <select id="panelColor">
            <option value="#ff9d00">Oranžová LED</option>
            <option value="#ffffff">Bílá LED</option>
            <option value="#00ff33">Zelená DOT</option>
        </select>
    </div>
</header>

<div id="viewport">
    <div class="canvas-container">
        <canvas id="buseCanvas"></canvas>
    </div>
</div>

<footer>
    <div class="input-row">
        <input type="text" id="lineIn" placeholder="Linka" style="max-width: 75px;" value="4">
        <input type="text" id="textIn" placeholder="CÍLOVÁ STANICE S DIAKRITIKOU" value="NÁMĚSTÍ REPUBLIKY">
    </div>
    <div class="btn-row">
        <button class="btn-update" onclick="renderPanel()">Aktualizovat</button>
        <button class="btn-export" onclick="exportToPNG()">Export PNG</button>
    </div>
</footer>

<script>
/**
 * ENGINE PRO ULTRA-REALISTICKÉ VYKRESLOVÁNÍ BUSE DIOD
 */
const canvas = document.getElementById('buseCanvas');
const ctx = canvas.getContext('2d');

// Výška panelu je fixně 19 bodů dle standardu SIMT/BUSE
const PANEL_HEIGHT = 19; 
const DOT_SIZE = 5; // Velikost jedné fyzické diody v pixelech na obrazovce

// Mapování kategorií fontů ze screenshotu na reálné parametry (velikost v px, tučnost)
const FONT_PROFILES = {
    'max_bold':   { size: 17, bold: true,  offsetY: 0 },
    'max':        { size: 17, bold: false, offsetY: 0 },
    'big_bold':   { size: 14, bold: true,  offsetY: 1 },
    'big':        { size: 14, bold: false, offsetY: 1 },
    'mid':        { size: 11, bold: false, offsetY: 3 },
    'small_bold': { size: 9,  bold: true,  offsetY: 4 },
    'small':      { size: 9,  bold: false, offsetY: 4 },
    'min':        { size: 7,  bold: false, offsetY: 5 }
};

function renderPanel() {
    const customWidth = parseInt(document.getElementById('panelWidth').value) || 140;
    const fontKey = document.getElementById('fontCategory').value;
    const ledColor = document.getElementById('panelColor').value;
    const lineText = document.getElementById('lineIn').value;
    const mainText = document.getElementById('textIn').value;

    const fontProfile = FONT_PROFILES[fontKey];

    // CSS proměnná pro barvu okrajů formuláře při změně
    document.documentElement.style.setProperty('--active-color', ledColor);

    // Nastavení reálné velikosti plátna
    canvas.width = customWidth * DOT_SIZE;
    canvas.height = PANEL_HEIGHT * DOT_SIZE;

    // 1. Vykreslení černého pozadí a zhasnuté mřížky panelu
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#111111"; // Fyzické zhasnuté LED diody
    for (let x = 0; x < customWidth; x++) {
        for (let y = 0; y < PANEL_HEIGHT; y++) {
            ctx.fillRect(x * DOT_SIZE, y * DOT_SIZE, DOT_SIZE - 1, DOT_SIZE - 1);
        }
    }

    // 2. Vytvoření skrytého plátna pro transformaci textu (včetně kompletní české diakritiky)
    const buffer = document.createElement('canvas');
    const bCtx = buffer.getContext('2d');
    buffer.width = customWidth;
    buffer.height = PANEL_HEIGHT;

    bCtx.fillStyle = "#ffffff";
    bCtx.textBaseline = "top";
    
    // Vykreslení čísla linky - vždy jasné a velké na začátku panelu, pokud je zadáno
    let textStartX = 2;
    if (lineText.trim() !== "") {
        bCtx.font = 'bold 15px "Courier New", monospace';
        bCtx.fillText(lineText.toUpperCase(), 2, 1);
        textStartX = bCtx.measureText(lineText).width + 4;
    }

    // Aplikace zvolené kategorie fontu ze screenshotu
    const fontWeight = fontProfile.bold ? "bold" : "normal";
    bCtx.font = `${fontWeight} ${fontProfile.size}px "Courier New", monospace`;
    
    // Vykreslení hlavního textu cíle
    bCtx.fillText(mainText.toUpperCase(), textStartX, fontProfile.offsetY);

    // 3. Převod vygenerované textové masky na ostré BUSE diody
    const maskData = bCtx.getImageData(0, 0, customWidth, PANEL_HEIGHT).data;
    
    // Aktivace záře svítícího panelu
    ctx.fillStyle = ledColor;
    ctx.shadowBlur = DOT_SIZE * 1.1;
    ctx.shadowColor = ledColor;

    for (let i = 0; i < maskData.length; i += 4) {
        const alpha = maskData[i + 3];
        if (alpha > 110) { // Práh citlivosti pro detekci pixelu písma
            const pixelIndex = i / 4;
            const x = pixelIndex % customWidth;
            const y = Math.floor(pixelIndex / customWidth);
            
            // Rozsvícení konkrétní LED diody na souřadnicích
            ctx.fillRect(x * DOT_SIZE, y * DOT_SIZE, DOT_SIZE - 1, DOT_SIZE - 1);
        }
    }
    
    // Vypnutí stínu pro případné další operace
    ctx.shadowBlur = 0;
}

function exportToPNG() {
    const width = document.getElementById('panelWidth').value;
    const link = document.createElement('a');
    link.download = `BUSE_vlastni_${width}x19_${Date.now()}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
}

// Nastavení sledování změn pro okamžitý překres v editoru
document.getElementById('panelWidth').addEventListener('input', renderPanel);
document.getElementById('fontCategory').addEventListener('change', renderPanel);
document.getElementById('panelColor').addEventListener('change', renderPanel);

// Spuštění po načtení stránky
window.onload = renderPanel;
</script>

</body>
</html>
