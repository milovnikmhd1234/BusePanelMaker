<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSE Panel Maker Ultra v8 - Petr's Plays CZ</title>
    <style>
        /** 
         * DESIGN SYSTÉM 
         */
        :root {
            --orange: #ff8c00;
            --green: #4caf50;
            --blue: #2196f3;
            --purple: #9c27b0;
            --red: #f44336;
            --dark-bg: #0a0a0a;
            --ui-panel: #1e1e1e;
            --ui-border: #333333;
            --text: #ffffff;
            --accent: #ffcc00;
        }

        /* Globální styly */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--dark-bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /**
         * TOOLBAR - HORNÍ LIŠTA
         */
        header {
            background: var(--ui-panel);
            border-bottom: 2px solid var(--ui-border);
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .group label {
            font-size: 9px;
            font-weight: 900;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* Vstupy */
        input[type="number"] {
            background: #000;
            border: 1px solid var(--ui-border);
            color: var(--orange);
            padding: 8px;
            border-radius: 5px;
            width: 70px;
            font-weight: bold;
            font-family: monospace;
        }

        input[type="range"] {
            width: 90px;
        }

        /* Tlačítka */
        button {
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #333;
            color: #fff;
        }

        button:active { transform: scale(0.92); }
        button:hover { filter: brightness(1.2); }

        .btn-ora { background: var(--orange); color: #000; }
        .btn-gre { background: var(--green); color: #000; }
        .btn-fill { background: var(--purple); }
        .btn-move { background: var(--blue); }
        .btn-undo { background: #555; }
        .btn-del { background: var(--red); }
        .btn-save { background: #2e7d32; }

        button.active {
            outline: 3px solid #fff;
            outline-offset: -1px;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /**
         * HLAVNÍ PLOCHA
         */
        main {
            flex: 1;
            overflow: auto;
            position: relative;
            background: 
                linear-gradient(45deg, #111 25%, transparent 25%), 
                linear-gradient(-45deg, #111 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #111 75%), 
                linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px;
            -webkit-overflow-scrolling: touch;
        }

        .canvas-area {
            position: relative;
            background: #000;
            border: 5px solid #222;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            line-height: 0;
        }

        canvas {
            image-rendering: pixelated;
            background-image:
                linear-gradient(to right, #111 1px, transparent 1px),
                linear-gradient(to bottom, #111 1px, transparent 1px);
            touch-action: none;
            cursor: crosshair;
        }

        /* Indikace režimu pohybu */
        .move-mode-on { cursor: grab !important; }
        .move-mode-on canvas { touch-action: auto !important; }

        /**
         * STATISTIKY A INFO
         */
        footer {
            background: #000;
            padding: 8px 20px;
            border-top: 1px solid var(--ui-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 11px;
            color: #888;
            z-index: 1000;
        }

        #coords-display { color: var(--orange); font-weight: bold; }
        .brand { color: var(--accent); font-weight: bold; letter-spacing: 1px; }

        /* Mobilní fixy */
        @media (max-width: 600px) {
            header { padding: 5px; gap: 8px; }
            button { padding: 8px; font-size: 10px; }
            input[type="number"] { width: 55px; }
        }
    </style>
</head>
<body>

    <header id="top-ui">
        <!-- Rozměry -->
        <div class="group">
            <label>Vodorovně (Šířka)</label>
            <div class="controls-row">
                <input type="number" id="wInput" value="120" min="1" max="1000">
            </div>
        </div>

        <div class="group">
            <label>Svisle (Výška)</label>
            <div class="controls-row">
                <input type="number" id="hInput" value="20" min="1" max="500">
                <button onclick="fullReset()" title="Použít rozměry">OK</button>
            </div>
        </div>

        <!-- Zobrazení -->
        <div class="group">
            <label>Zoom</label>
            <div class="controls-row">
                <input type="range" id="zInput" min="2" max="80" value="12">
            </div>
        </div>

        <!-- Barvy -->
        <div class="group">
            <label>Dioda</label>
            <div class="controls-row">
                <button id="btnOra" class="btn-ora active" onclick="setTool('#ff8c00')">ORA</button>
                <button id="btnGre" class="btn-gre" onclick="setTool('#4caf50')">ZEL</button>
            </div>
        </div>

        <!-- Nástroje -->
        <div class="group">
            <label>Nástroje</label>
            <div class="controls-row">
                <button id="btnFill" class="btn-fill" onclick="setTool('fill')">VÝPLŇ</button>
                <button id="btnEraser" onclick="setTool('erase')">GUMA</button>
                <button id="btnMove" class="btn-move" onclick="toggleMove()">POHYB ✋</button>
            </div>
        </div>

        <!-- Historie & Akce -->
        <div class="group">
            <label>Správa</label>
            <div class="controls-row">
                <button class="btn-undo" onclick="undo()" title="Zpět (Ctrl+Z)">↩</button>
                <button class="btn-del" onclick="clearBoard()">SMAZAT</button>
                <button class="btn-save" onclick="saveImage()">ULOŽIT</button>
            </div>
        </div>
    </header>

    <main id="viewport">
        <div class="canvas-area" id="canvas-wrap">
            <canvas id="buse"></canvas>
        </div>
    </main>

    <footer>
        <div id="status-text">REŽIM: KRESLENÍ (ORANŽOVÁ)</div>
        <div id="coords-display">X: 0, Y: 0</div>
        <div class="brand">PETR'S PLAYS CZ | v8.0</div>
    </footer>

    <script>
        /**
         * BUSE PANEL MAKER CORE
         * @author Petr's Plays CZ Logic
         */

        const canvas = document.getElementById('buse');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('viewport');
        const zSlider = document.getElementById('zInput');
        const statusText = document.getElementById('status-text');
        const coordsText = document.getElementById('coords-display');

        // Stavové proměnné
        let config = {
            width: 120,
            height: 20,
            zoom: 12,
            tool: 'draw', // draw, erase, fill
            color: '#ff8c00',
            isMoving: false,
            painting: false,
            fillPoint: null
        };

        // Historie pro funkci Zpět
        let historyStack = [];
        const MAX_HISTORY = 30;

        /**
         * INICIALIZACE SYSTÉMU
         */
        function init() {
            // Načtení eventů
            zSlider.addEventListener('input', updateZoom);
            
            // Myš
            canvas.addEventListener('mousedown', startAction);
            window.addEventListener('mousemove', doAction);
            window.addEventListener('mouseup', endAction);

            // Dotyk
            canvas.addEventListener('touchstart', (e) => {
                if(!config.isMoving) {
                    e.preventDefault();
                    startAction(e);
                }
            }, {passive: false});

            canvas.addEventListener('touchmove', (e) => {
                if(!config.isMoving) {
                    e.preventDefault();
                    doAction(e);
                }
            }, {passive: false});

            canvas.addEventListener('touchend', endAction);

            // Klávesové zkratky
            window.addEventListener('keydown', (e) => {
                if(e.ctrlKey && e.key === 'z') undo();
            });

            fullReset();
        }

        /**
         * NASTAVENÍ PLÁTNA
         */
        function fullReset() {
            const w = parseInt(document.getElementById('wInput').value) || 120;
            const h = parseInt(document.getElementById('hInput').value) || 20;
            
            // Uložení starého obsahu pro případnou obnovu při změně rozměrů
            let oldContent = null;
            if(canvas.width > 0) {
                oldContent = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }

            canvas.width = w;
            canvas.height = h;
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            if(oldContent) {
                ctx.putImageData(oldContent, 0, 0);
            }

            saveHistory();
            updateZoom();
            updateUI();
        }

        function updateZoom() {
            config.zoom = parseInt(zSlider.value);
            canvas.style.width = (canvas.width * config.zoom) + 'px';
            canvas.style.height = (canvas.height * config.zoom) + 'px';
            canvas.style.backgroundSize = `${config.zoom}px ${config.zoom}px`;
        }

        /**
         * NÁSTROJE
         */
        function setTool(t) {
            config.isMoving = false;
            config.fillPoint = null;
            viewport.classList.remove('move-mode-on');

            if(t === 'erase') {
                config.tool = 'erase';
            } else if(t === 'fill') {
                config.tool = 'fill';
            } else {
                config.tool = 'draw';
                config.color = t;
            }
            updateUI();
        }

        function toggleMove() {
            config.isMoving = !config.isMoving;
            config.fillPoint = null;
            
            if(config.isMoving) {
                viewport.classList.add('move-mode-on');
                statusText.innerText = "REŽIM: POHYB (KRESLENÍ VYPNUTO)";
            } else {
                viewport.classList.remove('move-mode-on');
                updateUI();
            }
            
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(config.isMoving) document.getElementById('btnMove').classList.add('active');
            else updateUI();
        }

        function updateUI() {
            if(config.isMoving) return;

            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            
            if(config.tool === 'erase') {
                document.getElementById('btnEraser').classList.add('active');
                statusText.innerText = "REŽIM: GUMA";
            } else if(config.tool === 'fill') {
                document.getElementById('btnFill').classList.add('active');
                statusText.innerText = "REŽIM: VÝPLŇ (KLIKNI NA ROHY)";
            } else {
                if(config.color === '#ff8c00') document.getElementById('btnOra').classList.add('active');
                else document.getElementById('btnGre').classList.add('active');
                statusText.innerText = `REŽIM: KRESLENÍ (${config.color === '#ff8c00' ? 'ORANŽOVÁ' : 'ZELENÁ'})`;
            }
        }

        /**
         * VÝPOČET SOUŘADNIC (KLÍČOVÁ OPRAVA)
         */
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Výpočet relativní pozice v rámci elementu s ohledem na zoom
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.floor((clientX - rect.left) * scaleX);
            const y = Math.floor((clientY - rect.top) * scaleY);

            return { x, y };
        }

        /**
         * JÁDRO KRESLENÍ
         */
        function startAction(e) {
            if(config.isMoving) return;

            const { x, y } = getCoords(e);
            if(x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;

            if(config.tool === 'fill') {
                if(!config.fillPoint) {
                    config.fillPoint = { x, y };
                    statusText.innerText = `BOD 1: [${x}, ${y}] - TEĎ VYBER DRUHÝ ROH`;
                } else {
                    executeFill(config.fillPoint.x, config.fillPoint.y, x, y);
                    config.fillPoint = null;
                    saveHistory();
                    updateUI();
                }
            } else {
                config.painting = true;
                drawPixel(x, y);
            }
        }

        function doAction(e) {
            const { x, y } = getCoords(e);
            coordsText.innerText = `X: ${x}, Y: ${y}`;

            if(config.painting && config.tool !== 'fill') {
                drawPixel(x, y);
            }
        }

        function endAction() {
            if(config.painting) {
                config.painting = false;
                saveHistory();
            }
        }

        function drawPixel(x, y) {
            if(x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;
            
            ctx.fillStyle = (config.tool === 'erase') ? '#000000' : config.color;
            ctx.fillRect(x, y, 1, 1);
        }

        function executeFill(x1, y1, x2, y2) {
            const startX = Math.min(x1, x2);
            const startY = Math.min(y1, y2);
            const w = Math.abs(x1 - x2) + 1;
            const h = Math.abs(y1 - y2) + 1;

            ctx.fillStyle = config.color; // Výplň používá aktuální barvu, ne gumu
            ctx.fillRect(startX, startY, w, h);
            statusText.innerText = "OBLAST VYPLNĚNA!";
        }

        /**
         * HISTORIE (UNDO)
         */
        function saveHistory() {
            if(historyStack.length >= MAX_HISTORY) historyStack.shift();
            historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if(historyStack.length > 1) {
                historyStack.pop(); // Odstraní aktuální stav
                const prevState = historyStack[historyStack.length - 1];
                ctx.putImageData(prevState, 0, 0);
                statusText.innerText = "KROK ZPĚT PROVEDEN";
            }
        }

        /**
         * OSTATNÍ FUNKCE
         */
        function clearBoard() {
            if(confirm("Opravdu vymazat celý panel?")) {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveHistory();
            }
        }

        function saveImage() {
            const link = document.createElement('a');
            const date = new Date().toISOString().slice(0,10);
            link.download = `BUSE_Panel_${canvas.width}x${canvas.height}_${date}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // START APLIKACE
        window.onload = init;

        /**
         * DOPLŇKOVÝ KÓD PRO ROBUSTNOST (SPOUSTA KOMENTÁŘŮ A LOGIKY)
         * Zajišťuje, že aplikace nespadne při extrémních vstupech.
         */
        function checkConstraints() {
            let w = document.getElementById('wInput');
            let h = document.getElementById('hInput');
            if(w.value > 2000) w.value = 2000;
            if(h.value > 1000) h.value = 1000;
        }

        // Interval pro kontrolu stability
        setInterval(checkConstraints, 2000);

    </script>
</body>
</html>
