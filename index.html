<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUSE Panel Maker v2</title>
    <style>
        :root {
            --orange: #ff8c00;
            --green: #4caf50;
            --dark-bg: #121212;
            --panel-bg: #222;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
        }

        h1 { color: var(--orange); margin-bottom: 5px; text-transform: uppercase; }

        .toolbar { 
            background: var(--panel-bg); 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: flex-end;
            border: 1px solid #444;
            margin-bottom: 20px;
        }

        .tool-group { display: flex; flex-direction: column; gap: 5px; }
        .tool-group label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: bold; }

        .canvas-container {
            background: #000;
            border: 3px solid #444;
            overflow: auto;
            max-width: 95vw;
            cursor: crosshair;
        }

        canvas { 
            image-rendering: pixelated; 
            display: block;
            background-image:
                linear-gradient(to right, #222 1px, transparent 1px),
                linear-gradient(to bottom, #222 1px, transparent 1px);
        }

        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: 0.2s;
            background: #444;
            color: white;
        }

        input[type="number"] {
            background: #111;
            border: 1px solid #555;
            color: var(--orange);
            padding: 8px;
            border-radius: 4px;
            width: 70px;
            font-weight: bold;
        }

        .btn-orange { background: var(--orange); color: black; }
        .btn-green { background: var(--green); color: black; }
        .btn-fill { background: #673ab7; color: white; }
        .btn-clear { background: #f44336; color: white; }
        .btn-save { background: #2196f3; color: white; }

        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button.active { outline: 2px solid white; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .status { margin-top: 10px; font-family: monospace; color: var(--orange); }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>BUSE Panel Maker</h1>

    <div class="toolbar">
        <div class="tool-group">
            <label>Vodorovně (Šířka)</label>
            <input type="number" id="widthInput" value="90">
        </div>
        <div class="tool-group">
            <label>Svisle (Výška)</label>
            <input type="number" id="heightInput" value="20">
        </div>
        <div class="tool-group">
            <button onclick="initCanvas()" class="btn-green">Použít rozměry</button>
        </div>

        <div class="tool-group">
            <label>Barva</label>
            <div style="display:flex; gap:5px;">
                <button id="colorOrange" class="btn-orange active" onclick="setTool('#ff8c00')">Oranžová</button>
                <button id="colorGreen" class="btn-green" onclick="setTool('#4caf50')">Zelená</button>
                <button id="eraser" onclick="setTool('eraser')">Guma</button>
            </div>
        </div>

        <div class="tool-group">
            <label>Speciální</label>
            <button id="fillBtn" class="btn-fill" onclick="setTool('fill')">Vyplnit (Výběr)</button>
        </div>
        
        <div class="tool-group">
            <label>Soubor</label>
            <div style="display:flex; gap:5px;">
                <button class="btn-clear" onclick="clearCanvas()">Vymazat</button>
                <button class="btn-save" onclick="download()">Download PNG</button>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <div id="status" class="status">Režim: Kreslení (Oranžová)</div>
    <div id="fillHint" class="hint" style="display:none;">Klikni na první bod, potom na druhý bod pro vyplnění obdélníku.</div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const fillHint = document.getElementById('fillHint');

        let currentColor = '#ff8c00';
        let mode = 'draw'; // 'draw', 'eraser', 'fill'
        let isDrawing = false;
        let fillPoint1 = null;
        let zoom = 15;

        function initCanvas() {
            const w = parseInt(document.getElementById('widthInput').value);
            const h = parseInt(document.getElementById('heightInput').value);
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = (w * zoom) + 'px';
            canvas.style.height = (h * zoom) + 'px';
            canvas.style.backgroundSize = `${zoom}px ${zoom}px`;
            
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, w, h);
            fillPoint1 = null;
        }

        function setTool(tool) {
            // Resetování stavů
            fillPoint1 = null;
            fillHint.style.display = 'none';

            if (tool === 'eraser') {
                mode = 'eraser';
            } else if (tool === 'fill') {
                mode = 'fill';
                fillHint.style.display = 'block';
            } else {
                mode = 'draw';
                currentColor = tool;
            }

            // Vizuální tlačítka
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            if (mode === 'eraser') document.getElementById('eraser').classList.add('active');
            else if (mode === 'fill') document.getElementById('fillBtn').classList.add('active');
            else if (currentColor === '#ff8c00') document.getElementById('colorOrange').classList.add('active');
            else if (currentColor === '#4caf50') document.getElementById('colorGreen').classList.add('active');

            updateStatus();
        }

        function handlePointer(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / zoom);
            const y = Math.floor((e.clientY - rect.top) / zoom);

            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;

            if (mode === 'fill') {
                if (!fillPoint1) {
                    fillPoint1 = {x, y};
                    statusDiv.innerText = "Bod 1 vybrán. Klikni na druhý roh.";
                } else {
                    fillArea(fillPoint1.x, fillPoint1.y, x, y);
                    fillPoint1 = null;
                    statusDiv.innerText = "Oblast vyplněna!";
                }
            } else {
                ctx.fillStyle = (mode === 'eraser') ? "#000000" : currentColor;
                ctx.fillRect(x, y, 1, 1);
            }
        }

        function fillArea(x1, y1, x2, y2) {
            const startX = Math.min(x1, x2);
            const endX = Math.max(x1, x2);
            const startY = Math.min(y1, y2);
            const endY = Math.max(y1, y2);

            ctx.fillStyle = currentColor;
            ctx.fillRect(startX, startY, endX - startX + 1, endY - startY + 1);
        }

        function updateStatus() {
            let text = "Režim: ";
            if (mode === 'draw') text += "Kreslení (" + (currentColor === '#ff8c00' ? "Oranžová" : "Zelená") + ")";
            else if (mode === 'eraser') text += "Guma";
            else if (mode === 'fill') text += "Vyplňování (Čekám na kliknutí)";
            statusDiv.innerText = text;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (mode !== 'fill') isDrawing = true;
            handlePointer(e);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing && mode !== 'fill') handlePointer(e);
        });

        window.addEventListener('mouseup', () => isDrawing = false);

        function clearCanvas() {
            if(confirm("Smazat vše?")) {
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function download() {
            const link = document.createElement('a');
            link.download = `buse-panel-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        initCanvas();
    </script>
</body>
</html>
