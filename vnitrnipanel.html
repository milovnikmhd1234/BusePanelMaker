<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSE Vnitřní Panely 1:1</title>
    <style>
        body {
            background-color: #1c1c1e;
            color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.4rem; margin-bottom: 15px; text-align: center; }

        /* Nastavení a editor */
        .editor-box {
            width: 100%;
            max-width: 800px;
            background: #2c2c2e;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            background: #3a3a3c;
            color: #aeaeae;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #30d158;
            color: #000;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .group-input { display: flex; flex-direction: column; }
        .group-input.full { grid-column: span 2; }
        
        label { font-size: 12px; color: #aeaeb2; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
        input, textarea {
            padding: 12px; background: #1c1c1e; border: 1px solid #48484a; color: #fff; border-radius: 8px; font-size: 16px;
        }
        input:focus, textarea:focus { outline: none; border-color: #30d158; }
        
        .anim-row { display: flex; align-items: center; gap: 10px; grid-column: span 2; margin-top: 5px; }
        .anim-row input { width: 20px; height: 20px; }

        .hidden { display: none !important; }

        /* Tlačítko pro export */
        .btn-download {
            background: #007aff; color: white; border: none; padding: 14px;
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer;
            margin-top: 15px; width: 100%; max-width: 350px; text-align: center;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }

        /* Živé náhledy na webu */
        .preview-wrapper {
            width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center;
        }

        canvas {
            width: 100%;
            height: auto;
            background: #000;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Blikací animace podle reality */
        .flicker { animation: buse-refresh 0.3s steps(2, start); }
        @keyframes buse-refresh { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>BUSE Panel Konstruktor 1:1</h1>

    <div class="editor-box">
        <div class="tabs">
            <button class="tab-btn active" id="t-small" onclick="setMode('small')">Malý panel (BS 120)</button>
            <button class="tab-btn" id="t-large" onclick="setMode('large')">Velký panel (BS 210 LCD)</button>
        </div>

        <div class="grid-inputs">
            <div class="group-input">
                <label for="val-line">Číslo linky:</label>
                <input type="text" id="val-line" value="850873" oninput="update()">
            </div>

            <div class="group-input s-only">
                <label for="val-s-r1">Hlavní směr (Horní):</label>
                <input type="text" id="val-s-r1" value="RÝMAŘOV" oninput="update()">
            </div>
            <div class="group-input s-only full">
                <label for="val-s-r2">Doplňující text (Spodní):</label>
                <input type="text" id="val-s-r2" value="aut.st." oninput="update()">
            </div>

            <div class="group-input l-only hidden">
                <label for="val-l-head">Cíl trasy v záhlaví:</label>
                <input type="text" id="val-l-head" value="Rýmařov aut.st." oninput="update()">
            </div>
            <div class="group-input l-only full hidden">
                <label for="val-l-stops">Stanice (Zóna | Název | Podtext) - Poslední řádek bude aktivní žlutý:</label>
                <textarea id="val-l-stops" rows="4" oninput="update()">115 | Jamartice | hřbitov
114 | Malá Štáhle | rest.
114 | Václavov | střed
114 | Bruntál | Seliko</textarea>
            </div>
            <div class="group-input l-only full hidden">
                <label for="val-l-conns">Následné přípoje (Linka | Cílová stanice | Čas dojezdu):</label>
                <textarea id="val-l-conns" rows="4" oninput="update()">861 | Vrbno p.Prad..rozc.Ludvíkov | 8 min
861 | Bruntál,žel.st. | 22 min
862 | Bruntál,žel.st. | 22 min
873 | Rýmařov,aut.st. | 31 min
862 | Karlova Studánka,dolní parkoviště | 34 min
930201 | Ostrava,ÚAN | 56 min</textarea>
            </div>

            <div class="anim-row">
                <input type="checkbox" id="val-anim" checked onchange="update()">
                <label for="val-anim">Zapnout BUSE překlápěcí efekt</label>
            </div>
        </div>
    </div>

    <div class="preview-wrapper">
        <canvas id="buse-canvas"></canvas>
        <button class="btn-download" onclick="downloadPNG()">📸 STÁHNOUT DO MOBILU (PNG)</button>
    </div>

    <script>
        let mode = 'small';
        const canvas = document.getElementById('buse-canvas');
        const ctx = canvas.getContext('2d');
        
        // Barevná paleta zón z fotek MSK/ODIS integrované dopravy
        const zoneColors = ['#30d158', '#ff9f0a', '#0a84ff', '#bf5af2', '#ff453a'];
        let timeStr = "00:00:00";

        // Aktualizace času sekundu po sekundě
        setInterval(() => {
            const now = new Date();
            timeStr = now.toTimeString().split(' ')[0];
            update(false); // Překreslení bez spuštění otravné animace každou sekundu
        }, 1000);

        function setMode(m) {
            mode = m;
            document.getElementById('t-small').classList.toggle('active', m === 'small');
            document.getElementById('t-large').classList.toggle('active', m === 'large');
            
            document.querySelectorAll('.s-only').forEach(el => el.classList.toggle('hidden', m !== 'small'));
            document.querySelectorAll('.l-only').forEach(el => el.classList.toggle('hidden', m !== 'large'));
            
            update(true);
        }

        function update(triggerAnim = true) {
            const anim = document.getElementById('val-anim').checked;
            
            if (triggerAnim && anim) {
                canvas.classList.remove('flicker');
                void canvas.offsetWidth;
                canvas.classList.add('flicker');
            }

            if (mode === 'small') {
                renderSmallPanel();
            } else {
                renderLargePanel();
            }
        }

        // ==========================================
        // VYKRESLENÍ MALÉHO PANELU (BS 120 DOT MATRIX)
        // ==========================================
        function renderSmallPanel() {
            // Reálný extrémně podlouhlý poměr stran konstrukce
            canvas.width = 1100;
            canvas.height = 140;

            // Čistě černé šasi s hliníkovým rámečkem
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simulace textury diodové masky na pozadí
            ctx.fillStyle = '#140202';
            for (let x = 4; x < canvas.width; x += 5) {
                for (let y = 4; y < canvas.height; y += 5) {
                    ctx.beginPath();
                    ctx.arc(x, y, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            const line = document.getElementById('val-line').value;
            const r1 = document.getElementById('val-s-r1').value.toUpperCase();
            const r2 = document.getElementById('val-s-r2').value;

            // Nastavení svítící červené barvy diod BUSE
            ctx.fillStyle = '#ff3b30';
            ctx.shadowColor = '#ff3b30';

            // 1. Číslo linky (Velké, masivní)
            ctx.shadowBlur = 8;
            ctx.font = 'bold 72px "Courier New", monospace';
            ctx.fillText(line, 25, 95);

            // 2. Fyzická oddělovací BUSE čára (dvojitá)
            ctx.shadowBlur = 0;
            ctx.fillRect(310, 12, 4, 116);
            ctx.fillRect(318, 12, 2, 116);

            // 3. Hlavní směr a doplňkový text
            ctx.shadowBlur = 8;
            ctx.font = 'bold 34px "Courier New", monospace';
            ctx.fillText(r1, 345, 60);

            ctx.font = 'bold 26px "Courier New", monospace';
            ctx.fillText(r2, 345, 105);

            // 4. Reálný čas na pravém okraji
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillText(timeStr, 960, 82);
            ctx.shadowBlur = 0;
        }

        // ==========================================
        // VYKRESLENÍ VELKÉHO PANELU (BS 210 LCD PANEL)
        // ==========================================
        function renderLargePanel() {
            // Skutečný širokoúhlý monitor 21:9
            canvas.width = 1280;
            canvas.height = 550;

            // Vnější masivní plastový kryt
            ctx.fillStyle = '#111113';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vnitřní LCD obrazovka
            const border = 14;
            const scrW = canvas.width - (border * 2);
            const scrH = canvas.height - (border * 2);
            
            // Základní podklad displeje (světle šedá jako na fotce)
            ctx.fillStyle = '#f4f4f6';
            ctx.fillRect(border, border, scrW, scrH);

            // Rozdělení obrazovky na levou (trasa) a pravou (přípoje) stranu (přesně 55% ku 45%)
            const splitPoint = border + (scrW * 0.54);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(border, border, scrW * 0.54, scrH); // Bílé pozadí pro trasu

            ctx.fillStyle = '#000000';
            ctx.fillRect(splitPoint, border, 4, scrH); // Dělící tlustá černá čára

            // --- LEVÁ STRANA: TEPLOMĚR TRASY ---
            const line = document.getElementById('val-line').value;
            const head = document.getElementById('val-l-head').value;
            
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 24px Arial, Helvetica, sans-serif';
            ctx.fillText(`${line} ${head}`, border + 20, border + 45);

            // Čára pod hlavním záhlavím trasy
            ctx.fillRect(border + 20, border + 65, (scrW * 0.54) - 40, 3);

            const stopsRaw = document.getElementById('val-l-stops').value.split('\n').filter(s => s.trim() !== '');
            let currentY = border + 125;
            let currentZone = "--";

            stopsRaw.forEach((row, idx) => {
                const parts = row.split('|');
                const zone = parts[0] ? parts[0].trim() : '100';
                const name = parts[1] ? parts[1].trim() : 'Zastávka';
                const sub = parts[2] ? parts[2].trim() : '';

                const isCurrent = (idx === stopsRaw.length - 1);
                if (isCurrent) currentZone = zone;

                // Žlutý indikační pruh pro aktuální polohu (přesně podle předlohy)
                if (isCurrent) {
                    ctx.fillStyle = '#ffeb3b';
                    ctx.fillRect(border + 2, currentY - 24, (scrW * 0.54) - 4, 62);
                }

                // Barevný box tarifního pásma
                const colorHex = zoneColors[parseInt(zone) % zoneColors.length || 0];
                ctx.fillStyle = colorHex;
                ctx.fillRect(border + 20, currentY - 18, 45, 28);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 15px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(zone, border + 42, currentY + 1);
                ctx.textAlign = 'left';

                // Spojovací vertikální linie trasy
                if (idx < stopsRaw.length - 1) {
                    ctx.fillStyle = '#8e8e93';
                    ctx.fillRect(border + 94, currentY + 10, 4, 54);
                }

                // Červený oválek / Černý bod pro aktuální stanici
                ctx.fillStyle = isCurrent ? '#000000' : '#e00000';
                ctx.beginPath();
                ctx.arc(border + 96, currentY - 2, isCurrent ? 11 : 9, 0, Math.PI * 2);
                ctx.fill();

                // Text názvu zastávky
                ctx.fillStyle = '#000000';
                ctx.font = isCurrent ? '900 26px Arial' : 'bold 21px Arial';
                ctx.fillText(name, border + 125, currentY + 7);

                if (sub) {
                    ctx.fillStyle = '#636366';
                    ctx.font = 'italic 16px Arial';
                    ctx.fillText(sub, border + 135 + ctx.measureText(name).width, currentY + 5);
                }

                currentY += 64;
            });

            // --- PRAVÁ STRANA: NAVAZUJÍCÍ SPOJE ---
            // Černá lišta nahoře
            ctx.fillStyle = '#000000';
            ctx.fillRect(splitPoint + 4, border, (scrW * 0.46) - 4, 52);

            // Text aktuální zóny
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 22px Arial';
            ctx.fillText("Zóna " + currentZone, splitPoint + 20, border + 34);

            // Žlutý reálný čas na černé liště
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(timeStr, canvas.width - border - 20, border + 34);
            ctx.textAlign = 'left';

            // Podnadpis sekce spojů
            ctx.fillStyle = '#48484a';
            ctx.font = 'bold 14px Arial';
            ctx.fillText("NÁSLEDNÉ SPOJE / ODJEZDY", splitPoint + 20, border + 95);
            
            ctx.fillStyle = '#aeaeb2';
            ctx.fillRect(splitPoint + 20, border + 106, (scrW * 0.46) - 40, 1.5);

            // Výpis přípojů pod sebou
            const connsRaw = document.getElementById('val-l-conns').value.split('\n').filter(c => c.trim() !== '');
            let connY = border + 145;

            connsRaw.forEach(row => {
                const parts = row.split('|');
                const cLine = parts[0] ? parts[0].trim() : '';
                const cDest = parts[1] ? parts[1].trim() : '';
                const cTime = parts[2] ? parts[2].trim() : '';

                // Tmavé zázemí pro číslo linky přípoje
                ctx.fillStyle = '#2c2c2e';
                ctx.fillRect(splitPoint + 20, connY - 18, 55, 24);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(cLine, splitPoint + 475 / 10, connY - 1);
                ctx.textAlign = 'left';

                // Název cíle spoje
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 17px Arial';
                
                // Zkrácení textu, pokud je příliš dlouhý, aby nezasahoval do času
                let maxTextW = 260;
                let textToDraw = cDest;
                if(ctx.measureText(textToDraw).width > maxTextW) {
                    while(ctx.measureText(textToDraw + "...").width > maxTextW) {
                        textToDraw = textToDraw.slice(0, -1);
                    }
                    textToDraw += "...";
                }
                ctx.fillText(textToDraw, splitPoint + 85, connY - 1);

                // Červený odpočet minut do odjezdu
                ctx.fillStyle = '#d12c2c';
                ctx.font = 'bold 17px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(cTime, canvas.width - border - 20, connY - 1);
                ctx.textAlign = 'left';

                connY += 38;
            });
        }

        // Bezpečné stažení hotového vygenerovaného PNG souboru
        function downloadPNG() {
            const lineNum = document.getElementById('val-line').value || 'buse';
            const imgData = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `BUSE-${mode}-${lineNum}.png`;
            link.href = imgData;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Výchozí nastavení při otevření stránky
        setMode('small');
    </script>
</body>
</html>
